<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日热点</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --panel-soft: #f9fafb;
        --text: #0f172a;
        --text-main: #1f2937;
        --text-support: #344054;
        --text-quiet: #536274;
        --muted: #475467;
        --line: #dde3ea;
        --teal: #10756e;
        --teal-soft: #e6f4f2;
        --coral: #c2410c;
        --coral-soft: #fff0e7;
        --amber: #a16207;
        --amber-soft: #fff7d6;
        --green: #166534;
        --green-soft: #e8f6ed;
        --shadow: 0 18px 45px rgba(31, 41, 51, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 10% 0%, rgba(16, 117, 110, 0.12), transparent 30%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 34%, var(--bg) 100%);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 22px;
      }

      .toc {
        display: none;
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 10;
        width: 260px;
        max-height: calc(100vh - 36px);
        overflow: auto;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .toc-title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 900;
      }

      .toc-list {
        display: grid;
        gap: 6px;
      }

      .toc-link {
        display: block;
        padding: 8px 9px;
        border-radius: 8px;
        color: #344054;
        font-size: 12px;
        line-height: 1.35;
        text-decoration: none;
      }

      .toc-link:hover {
        background: var(--teal-soft);
        color: var(--teal);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        padding: 16px 0 20px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .subline {
        margin: 12px 0 0;
        max-width: 780px;
        color: var(--text-support);
        font-size: 15px;
        line-height: 1.65;
      }

      .hero-panel {
        width: min(360px, 100%);
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .hero-panel strong {
        display: block;
        margin-bottom: 6px;
        font-size: 22px;
      }

      .hero-panel span {
        color: var(--text-support);
        font-size: 13px;
        line-height: 1.55;
      }

      .page-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 14px;
      }

      .page-tab {
        display: inline-flex;
        align-items: center;
        height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #344054;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      .page-tab.active {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 14px;
      }

      .metric {
        min-height: 76px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric b {
        display: block;
        font-size: 24px;
        line-height: 1;
      }

      .metric span {
        display: block;
        margin-top: 8px;
        color: var(--text-quiet);
        font-size: 12px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 150px 150px 126px;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 8px 22px rgba(31, 41, 51, 0.05);
      }

      .control,
      .action {
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
      }

      .control {
        width: 100%;
        padding: 0 12px;
      }

      .action {
        padding: 0 12px;
        font-weight: 700;
      }

      .action.primary {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 14px;
      }

      .tab {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #344054;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 900;
      }

      .tab.active {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .history {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto auto;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .history-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
      }

      .history-note {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .feed {
        display: grid;
        gap: 12px;
      }

      .opportunity {
        display: grid;
        grid-template-columns: minmax(270px, 0.7fr) minmax(560px, 1.3fr);
        gap: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 12px 28px rgba(31, 41, 51, 0.06);
        scroll-margin-top: 18px;
      }

      .opportunity > section {
        padding: 12px;
      }

      .opportunity > section + section {
        border-left: 1px solid var(--line);
      }

      .event-title {
        margin: 0 0 9px;
        color: var(--text);
        font-size: 17px;
        line-height: 1.35;
      }

      .opportunity-source {
        background: #fbfcfd;
      }

      .opportunity-main {
        display: grid;
        gap: 10px;
      }

      .heat-row {
        display: grid;
        grid-template-columns: 54px 1fr;
        gap: 8px;
        align-items: center;
        margin: 10px 0;
      }

      .heat-row b {
        color: var(--text);
        font-size: 24px;
        line-height: 1;
      }

      .heat-row span {
        color: var(--text-support);
        font-size: 12px;
        font-weight: 800;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 9px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--panel-soft);
        color: #344054;
        font-size: 12px;
        font-weight: 700;
      }

      .decision-metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }

      .decision-metric {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .decision-metric b {
        display: block;
        color: var(--text);
        font-size: 22px;
        line-height: 1;
      }

      .decision-metric span {
        display: block;
        margin-top: 5px;
        color: var(--text-support);
        font-size: 12px;
        font-weight: 800;
      }

      .decision-badge {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        min-height: 30px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 950;
      }

      .decision-badge.do {
        background: var(--green-soft);
        color: var(--green);
      }

      .decision-badge.caution {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .decision-badge.no {
        background: var(--coral-soft);
        color: var(--coral);
      }

      .opportunity-summary {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid rgba(16, 117, 110, 0.26);
        border-radius: 8px;
        background: #f7fbfb;
      }

      .opportunity-summary h3 {
        margin: 0;
        color: var(--text);
        font-size: 18px;
        line-height: 1.38;
      }

      .opportunity-summary p {
        margin: 0;
        color: var(--text-main);
        font-size: 13px;
        line-height: 1.55;
      }

      .usecase-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .usecase-item {
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .usecase-item b {
        display: block;
        margin-bottom: 4px;
        color: var(--text);
        font-size: 12px;
      }

      .usecase-item span {
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        color: var(--text-main);
        font-size: 12px;
        line-height: 1.45;
      }

      .keyword-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .keyword-chip {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--text-main);
        font-size: 12px;
        font-weight: 800;
      }

      .decision-row {
        display: grid;
        grid-template-columns: minmax(220px, 0.75fr) minmax(0, 1.25fr);
        gap: 10px;
        align-items: start;
      }

      .tag.teal {
        background: var(--teal-soft);
        color: #115e59;
      }

      .tag.green {
        background: var(--green-soft);
        color: var(--green);
      }

      .tag.amber {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .tag.coral {
        background: var(--coral-soft);
        color: var(--coral);
      }

      .heat {
        display: grid;
        grid-template-columns: 58px 1fr;
        gap: 10px;
        align-items: center;
        margin: 12px 0;
      }

      .heat-score {
        color: var(--teal);
        font-size: 28px;
        font-weight: 900;
        line-height: 1;
      }

      .bar {
        overflow: hidden;
        height: 9px;
        border-radius: 999px;
        background: #e8edf2;
      }

      .bar i {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--teal), #d97706);
      }

      .label {
        margin: 0 0 5px;
        color: var(--text-quiet);
        font-size: 12px;
        font-weight: 800;
      }

      .text {
        margin: 0 0 8px;
        color: var(--text-main);
        font-size: 13px;
        line-height: 1.55;
      }

      .link-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0 0 8px;
      }

      .rank-link {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--teal);
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
      }

      .rank-link:hover {
        border-color: var(--teal);
        background: var(--teal-soft);
      }

      .source-list {
        display: grid;
        gap: 8px;
        margin: 0 0 12px;
      }

      .compact-grid {
        display: grid;
        grid-template-columns: minmax(180px, 0.62fr) minmax(0, 1.38fr);
        gap: 10px;
      }

      .source-item {
        padding: 9px 10px;
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--text-main);
        font-size: 13px;
        line-height: 1.5;
      }

      .source-item b {
        color: var(--text);
      }

      .source-toggle {
        height: 34px;
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--teal);
        padding: 0 10px;
        font-size: 13px;
        font-weight: 800;
      }

      .idea-title {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 900;
      }

      .result-panel {
        display: grid;
        gap: 8px;
        margin-bottom: 8px;
        padding: 10px;
        border: 1px solid var(--teal);
        border-radius: 8px;
        background: var(--teal-soft);
      }

      .decision {
        margin: 0;
        color: #0f3f3b;
        font-size: 16px;
        font-weight: 900;
        line-height: 1.45;
      }

      .name-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 5px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .name-options li {
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        font-size: 13px;
        font-weight: 800;
      }

      .quick-facts {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        margin-top: 2px;
      }

      .fact {
        padding: 8px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid var(--line);
      }

      .fact b {
        display: block;
        margin-bottom: 3px;
        color: var(--text-support);
        font-size: 11px;
      }

      .fact span {
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
      }

      details.analysis {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      details.analysis summary {
        cursor: pointer;
        padding: 11px 12px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      details.inline-detail {
        margin: 6px 0 8px;
        border: 0;
        background: transparent;
      }

      details.inline-detail summary {
        cursor: pointer;
        color: var(--teal);
        font-size: 12px;
        font-weight: 900;
      }

      .detail-body {
        padding: 0 12px 12px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .mini-button {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #1f2933;
        padding: 0 11px;
        font-size: 13px;
        font-weight: 800;
      }

      .mini-button.favorite.active {
        border-color: #d97706;
        background: var(--amber-soft);
        color: var(--amber);
      }

      .mini-button.copy {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .empty {
        display: none;
        padding: 34px 18px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text-quiet);
        text-align: center;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        z-index: 20;
        transform: translateX(-50%) translateY(16px);
        opacity: 0;
        pointer-events: none;
        padding: 10px 14px;
        border-radius: 8px;
        background: #17212f;
        color: #fff;
        font-size: 13px;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .hero-panel {
          width: 100%;
        }

        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .toolbar {
          grid-template-columns: 1fr 1fr;
        }

        .history {
          grid-template-columns: 1fr;
        }

        .toolbar input {
          grid-column: 1 / -1;
        }

        .opportunity {
          grid-template-columns: 1fr;
        }

        .compact-grid,
        .name-options,
        .decision-row,
        .quick-facts,
        .usecase-strip {
          grid-template-columns: 1fr;
        }

        .opportunity > section + section {
          border-left: 0;
          border-top: 1px solid var(--line);
        }
      }

      @media (min-width: 1320px) {
        .app {
          width: min(1180px, calc(100% - 320px));
          margin-left: 24px;
          margin-right: 320px;
        }

        .toc {
          display: block;
        }
      }

      @media (max-width: 560px) {
        .app {
          padding: 14px;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }

        .opportunity > section {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">每日早晨八点开始</p>
          <h1>每日热点</h1>
          <p class="subline" id="summary">正在读取最新报告...</p>
        </div>
        <aside class="hero-panel">
          <strong id="generatedAt">生成时间：-</strong>
          <span>先看做不做，再看用户为什么会用、微信里搜什么、研发边界在哪里。</span>
        </aside>
      </header>

      <nav class="page-tabs" aria-label="报告页面">
        <a class="page-tab active" href="./index.html">今日热点</a>
        <a class="page-tab" href="./macro.html">金融宏观</a>
        <a class="page-tab" href="./memo.html">工作备忘录</a>
      </nav>

      <section class="stats decision-metrics" aria-label="报告概览">
        <div class="metric decision-metric">
          <b id="itemCount">0</b>
          <span>可做机会</span>
        </div>
        <div class="metric decision-metric">
          <b id="cautionCount">0</b>
          <span>谨慎机会</span>
        </div>
        <div class="metric decision-metric">
          <b id="rejectCount">0</b>
          <span>放弃热点</span>
        </div>
        <div class="metric decision-metric">
          <b id="favoriteCount">0</b>
          <span>已收藏点子</span>
        </div>
      </section>

      <section class="history" aria-label="历史热点">
        <div>
          <p class="history-title">历史热点列表</p>
          <p class="history-note" id="historyStatus">正在读取历史报告...</p>
        </div>
        <select class="control" id="historySelect">
          <option value="data/latest.json">今日热点</option>
        </select>
        <button id="latestButton" class="action" type="button">回到最新</button>
      </section>

      <section class="toolbar" aria-label="筛选工具">
        <input class="control" id="search" type="search" placeholder="搜索事件、平台、关键词、机会点" />
        <select class="control" id="priority">
          <option value="">全部优先级</option>
          <option value="高">高</option>
          <option value="中">中</option>
          <option value="低">低</option>
          <option value="观察">观察</option>
        </select>
        <select class="control" id="platform">
          <option value="">全部平台</option>
        </select>
        <button id="favoritesOnly" class="action" type="button">只看收藏</button>
      </section>

      <section class="tabs" aria-label="做不做筛选">
        <button class="tab active" data-decision-filter="all" type="button">全部</button>
        <button class="tab" data-decision-filter="do" type="button">只看可做</button>
        <button class="tab" data-decision-filter="no" type="button">只看不做</button>
      </section>

      <section class="feed" id="feed" aria-live="polite"></section>
      <div class="empty" id="empty">没有符合筛选条件的机会点。</div>
    </main>

    <aside class="toc" aria-label="热点目录">
      <p class="toc-title">热点目录</p>
      <nav class="toc-list" id="tocList"></nav>
    </aside>

    <div class="toast" id="toast">已复制</div>

    <script>
      const state = {
        items: [],
        favoritesOnly: false,
        decisionFilter: "all",
        favorites: new Set(JSON.parse(localStorage.getItem("hotspotFavorites") || "[]")),
        expandedSources: new Set(),
        expandedRanks: new Set(),
      };

      const els = {
        feed: document.querySelector("#feed"),
        summary: document.querySelector("#summary"),
        generatedAt: document.querySelector("#generatedAt"),
        itemCount: document.querySelector("#itemCount"),
        cautionCount: document.querySelector("#cautionCount"),
        rejectCount: document.querySelector("#rejectCount"),
        favoriteCount: document.querySelector("#favoriteCount"),
        highCount: document.querySelector("#highCount"),
        platformCount: document.querySelector("#platformCount"),
        search: document.querySelector("#search"),
        priority: document.querySelector("#priority"),
        platform: document.querySelector("#platform"),
        favoritesOnly: document.querySelector("#favoritesOnly"),
        historySelect: document.querySelector("#historySelect"),
        historyStatus: document.querySelector("#historyStatus"),
        latestButton: document.querySelector("#latestButton"),
        tocList: document.querySelector("#tocList"),
        decisionTabs: document.querySelectorAll("[data-decision-filter]"),
        empty: document.querySelector("#empty"),
        toast: document.querySelector("#toast"),
      };

      function text(value) {
        if (Array.isArray(value)) return value.join("、");
        return value == null || value === "" ? "-" : String(value);
      }

      function escapeHtml(value) {
        return text(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function safeUrl(value) {
        try {
          const url = new URL(String(value || ""), window.location.href);
          return ["http:", "https:"].includes(url.protocol) ? url.href : "";
        } catch {
          return "";
        }
      }

      function saveFavorites() {
        localStorage.setItem("hotspotFavorites", JSON.stringify([...state.favorites]));
      }

      function itemMatches(item) {
        const q = els.search.value.trim().toLowerCase();
        const priority = els.priority.value;
        const platform = els.platform.value;
        const haystack = [
          item.event,
          item.platforms?.join(" "),
          item.userConcern,
          item.userDemand,
          item.customer,
          item.hotspotNeedRelevance,
          item.needStrength,
          item.urgency,
          item.competitionIntensity,
          item.doDecisionRationale,
          item.wechatSearchKeywords,
          item.persona,
          item.scenario,
          item.userActionChain,
          item.actionValidation,
          item.criticReview,
          item.finalVerdict,
          item.miniappOpportunity,
          item.nameDirection,
          item.searchKeywords,
          item.coreFeatures,
          item.recommendation,
        ]
          .join(" ")
          .toLowerCase();

        if (q && !haystack.includes(q)) return false;
        if (priority && item.priority !== priority) return false;
        if (platform && !(item.platforms || []).includes(platform)) return false;
        if (state.favoritesOnly && !state.favorites.has(item.id)) return false;
        const decision = text(item.finalDecision || item.recommendation);
        if (state.decisionFilter === "do" && !/^做|^可做|^谨慎做/.test(decision)) return false;
        if (state.decisionFilter === "no" && !/^不做|^不值得/.test(decision)) return false;
        return true;
      }

      function riskTone(value) {
        const v = text(value);
        if (/高|敏感|资质|不建议|风险/.test(v)) return "coral";
        if (/中|观察/.test(v)) return "amber";
        return "green";
      }

      function priorityTone(value) {
        if (value === "高") return "coral";
        if (value === "中") return "amber";
        if (value === "低") return "green";
        return "teal";
      }

      function decisionKind(item) {
        const decision = text(item.finalDecision || item.finalVerdict || item.recommendation);
        if (/^不做|^不值得|放弃/.test(decision)) return "no";
        if (/谨慎|观察|边界|只做/.test(decision)) return "caution";
        if (/^做|^可做/.test(decision)) return "do";
        return item.priority === "高" ? "do" : "caution";
      }

      function decisionTone(kind) {
        return kind === "do" ? "可做" : kind === "no" ? "放弃" : "谨慎";
      }

      function renderDecisionBadge(item) {
        const kind = decisionKind(item);
        return `<span class="decision-badge ${kind}">${decisionTone(kind)}</span>`;
      }

      function splitKeywords(value) {
        return text(value)
          .split(/[、,，\s]+/)
          .map((item) => item.trim())
          .filter((item) => item && item !== "-")
          .slice(0, 8);
      }

      function renderKeywordRow(item) {
        const words = splitKeywords(item.wechatSearchKeywords || item.searchKeywords);
        return words.length
          ? `<div class="keyword-row">${words.map((word) => `<span class="keyword-chip">${escapeHtml(word)}</span>`).join("")}</div>`
          : `<p class="text">暂无可用搜索词。</p>`;
      }

      function renderUseCaseStrip(item) {
        return `
          <div class="usecase-strip">
            <div class="usecase-item"><b>用户为什么会用</b><span>${escapeHtml(item.whyUseMiniapp || item.actionValidation || "只有当小程序比原平台更轻、更适合微信分享/收藏/提醒时才成立。")}</span></div>
            <div class="usecase-item"><b>微信里的真实动作</b><span>${escapeHtml(item.actionValidation || item.userActionChain || "用户需要能在微信内完成搜索、收藏、提醒、卡片或分享。")}</span></div>
            <div class="usecase-item"><b>研发边界</b><span>${escapeHtml(item.developmentReviewResult || item.feasibilityNotes || "只做公开资料整理、清单、提醒和卡片，不碰内容版权、资质和专业建议。")}</span></div>
          </div>
        `;
      }

      function renderOpportunitySummary(item) {
        const decision = item.finalDecision || item.finalVerdict || item.recommendation || "需评估";
        return `
          <div class="opportunity-summary">
            <div class="meta">
              ${renderDecisionBadge(item)}
              <span class="tag green">热度 ${Math.max(0, Math.min(100, Number(item.heatNormalized) || 0))}</span>
              <span class="tag ${priorityTone(item.priority)}">${escapeHtml(text(item.priority))}</span>
            </div>
            <h3>${escapeHtml(item.miniappOpportunity || item.miniappIntro || decision)}</h3>
            <p><b>最终结论：</b>${escapeHtml(decision)}</p>
          </div>
        `;
      }

      function renderDecisionMetrics(items) {
        const counts = items.reduce((acc, item) => {
          acc[decisionKind(item)] += 1;
          return acc;
        }, { do: 0, caution: 0, no: 0 });
        return counts;
      }

      function copyTextFor(item) {
        return [
          `事件内容：${text(item.event)}`,
          `用户关心什么：${text(item.userConcern)}`,
          `可切入的机会：${text(item.userDemand)}`,
          `建议名称：${text(item.miniappNameOptions || item.nameDirection)}`,
          `小程序机会：${text(item.miniappOpportunity || item.miniappIntro)}`,
          `核心功能：${text(item.coreFeatures)}`,
          `搜索关键词：${text(item.wechatSearchKeywords || item.searchKeywords)}`,
        ].join("\n");
      }

      function domIdFor(item) {
        return `hotspot-${String(item.id || "").replace(/[^a-zA-Z0-9_-]/g, "-")}`;
      }

      function renderNameOptions(item) {
        const options = Array.isArray(item.miniappNameOptions)
          ? item.miniappNameOptions
          : text(item.nameDirection)
              .split(/[、,，]/)
              .map((name) => name.trim())
              .filter(Boolean)
              .slice(0, 4);
        const normalized = options.length ? options : ["待定名称方向"];
        return `<ul class="name-options">${normalized.map((name) => `<li>${escapeHtml(name)}</li>`).join("")}</ul>`;
      }

      function normalizeSourceLinks(item) {
        if (Array.isArray(item.sourceLinks) && item.sourceLinks.length) {
          return item.sourceLinks.map((entry, index) => {
            if (typeof entry === "string") {
              return {
                platform: item.platforms?.[index] || `来源 ${index + 1}`,
                url: entry,
                rank: "",
                title: item.event,
              };
            }
            return {
              platform: entry.platform || item.platforms?.[index] || `来源 ${index + 1}`,
              url: entry.url || entry.href || "",
              rank: entry.rank || entry.ranking || "",
              title: entry.title || entry.hotspotTitle || item.event,
              heat: entry.heat || entry.heatRaw || "",
            };
          });
        }

        return (item.platforms || []).map((platform) => ({
          platform,
          url: "",
          rank: "",
          title: item.event,
          heat: "",
        }));
      }

      function renderRankLinks(item) {
        const links = normalizeSourceLinks(item);
        if (!links.length) return `<p class="text">${escapeHtml(item.rankings)}</p>`;
        const shouldCollapse = links.length > 3;
        const expanded = state.expandedRanks?.has(item.id);
        const visibleLinks = shouldCollapse && !expanded ? links.slice(0, 3) : links;

        return `
          <div class="link-list">
            ${visibleLinks
              .map((entry) => {
                const label = [entry.platform, entry.rank].filter(Boolean).join(" ");
                const url = safeUrl(entry.url);
                if (!url) return `<span class="rank-link">${escapeHtml(label || entry.platform)}</span>`;
                return `<a class="rank-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label || entry.platform)}</a>`;
              })
              .join("")}
            ${
              shouldCollapse
                ? `<button class="source-toggle" data-action="rank-toggle" data-id="${escapeHtml(item.id)}" type="button">${expanded ? "收回" : `展开 ${links.length} 个排名`}</button>`
                : ""
            }
          </div>
        `;
      }

      function renderSourceItems(item) {
        const links = normalizeSourceLinks(item);
        const items = links.length
          ? links
          : [{ platform: "事件", rank: "", title: item.event, heat: "" }];
        const shouldCollapse = items.length > 4;
        const expanded = state.expandedSources.has(item.id);
        const visibleItems = shouldCollapse && !expanded ? items.slice(0, 4) : items;

        return `
          <div class="source-list">
            ${visibleItems
              .map((entry) => {
                const prefix = [entry.platform, entry.rank].filter(Boolean).join(" ");
                const heat = entry.heat ? `｜${entry.heat}` : "";
                return `<div class="source-item"><b>${escapeHtml(prefix || "事件")}</b>${escapeHtml(heat)}<br>${escapeHtml(entry.title || item.event)}</div>`;
              })
              .join("")}
            ${
              shouldCollapse
                ? `<button class="source-toggle" data-action="source-toggle" data-id="${escapeHtml(item.id)}" type="button">${expanded ? "收回" : `展开全部 ${items.length} 条`}</button>`
                : ""
            }
          </div>
        `;
      }

      async function copyIdea(item) {
        const content = copyTextFor(item);
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(content);
        } else {
          const textarea = document.createElement("textarea");
          textarea.value = content;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
        showToast("已复制这个小程序点子");
      }

      let toastTimer;
      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1600);
      }

      function renderStats(items) {
        const counts = renderDecisionMetrics(state.items);
        els.itemCount.textContent = counts.do;
        if (els.cautionCount) els.cautionCount.textContent = counts.caution;
        if (els.rejectCount) els.rejectCount.textContent = counts.no;
        els.favoriteCount.textContent = state.favorites.size;
      }

      function renderToc(items) {
        if (!els.tocList) return;
        els.tocList.innerHTML = items
          .map((item, index) => {
            const label = `${index + 1}. ${text(item.event)}`;
            return `<a class="toc-link" href="#${escapeHtml(domIdFor(item))}" title="${escapeHtml(item.event)}">${escapeHtml(label)}</a>`;
          })
          .join("");
      }

      function render() {
        const items = state.items
          .filter(itemMatches)
          .sort((a, b) => (b.heatNormalized || 0) - (a.heatNormalized || 0));

        els.feed.innerHTML = items
          .map((item) => {
            const active = state.favorites.has(item.id);
            const heat = Math.max(0, Math.min(100, Number(item.heatNormalized) || 0));
            return `
              <article class="opportunity" id="${escapeHtml(domIdFor(item))}">
                <section class="opportunity-source">
                  <div class="meta">
                    <span class="tag teal">${escapeHtml(text(item.platforms))}</span>
                    <span class="tag ${riskTone(item.complianceRisk)}">${escapeHtml(text(item.complianceRisk))}</span>
                  </div>
                  <h2 class="event-title">${escapeHtml(item.event)}</h2>
                  <div class="heat-row">
                    <b>${heat}</b>
                    <div>
                      <span>${escapeHtml(item.heatWindow || "热度持续时间待判断")}</span>
                      <div class="bar"><i style="width:${heat}%"></i></div>
                    </div>
                  </div>
                  <p class="label">平台排名</p>
                  ${renderRankLinks(item)}
                  <details class="inline-detail">
                    <summary>查看事件全部内容</summary>
                    <div class="detail-body">
                      ${renderSourceItems(item)}
                    </div>
                  </details>
                </section>
                <section class="opportunity-main">
                  ${renderOpportunitySummary(item)}
                  ${renderUseCaseStrip(item)}
                  <div class="result-panel">
                    <div>
                      <p class="idea-title">小程序名称备选</p>
                      ${renderNameOptions(item)}
                    </div>
                    <div class="compact-grid">
                      <div>
                        <p class="label">核心功能</p>
                        <p class="text">${escapeHtml(item.coreFeatures)}</p>
                      </div>
                      <div>
                        <p class="label">微信搜索词</p>
                        ${renderKeywordRow(item)}
                      </div>
                    </div>
                    <details class="inline-detail">
                      <summary>查看搜索词、命名规范和关键词策略</summary>
                      <div class="detail-body">
                        <p class="label">微信搜索关键词</p>
                        <p class="text">${escapeHtml(item.wechatSearchKeywords || item.searchKeywords)}</p>
                        <p class="label">名称规范提醒</p>
                        <p class="text">${escapeHtml(item.namingComplianceNotes || "避开明星、综艺、赛事、品牌、媒体和需要资质的关键词；名称用通用需求词。")}</p>
                        <p class="label">搜索关键词策略</p>
                        <p class="text">${escapeHtml(item.searchKeywords)}</p>
                      </div>
                    </details>
                  </div>
                  <div class="quick-facts">
                    <div class="fact"><b>客户</b><span>${escapeHtml(item.customer || "微信高频用户")}</span></div>
                    <div class="fact"><b>相关性</b><span>${escapeHtml(item.hotspotNeedRelevance || "需评估")}</span></div>
                    <div class="fact"><b>需求</b><span>${escapeHtml(item.needStrength || "非刚需")}</span></div>
                    <div class="fact"><b>紧急度</b><span>${escapeHtml(item.urgency || "低")}</span></div>
                    <div class="fact"><b>竞争</b><span>${escapeHtml(item.competitionIntensity || "高")}</span></div>
                  </div>
                  <details class="analysis">
                    <summary>展开用户需求分析</summary>
                    <div class="detail-body">
                      <p class="label">用户真正关心什么</p>
                      <p class="text">${escapeHtml(item.userConcern)}</p>
                      <p class="label">客户是谁</p>
                      <p class="text">${escapeHtml(item.customer || item.persona)}</p>
                      <p class="label">热点和小程序需求是否相关</p>
                      <p class="text">${escapeHtml(item.hotspotNeedRelevance || "需要判断热点能否转成微信内的搜索、收藏、提醒、分享动作。")}</p>
                      <p class="label">刚需 / 紧急 / 竞争</p>
                      <p class="text">${escapeHtml([`需求：${text(item.needStrength || "非刚需")}`, `紧急度：${text(item.urgency || "低")}`, `竞争：${text(item.competitionIntensity || "高")}`].join("；"))}</p>
                      <p class="label">做不做的核心理由</p>
                      <p class="text">${escapeHtml(item.doDecisionRationale || item.finalDecision || item.recommendation)}</p>
                      <p class="label">热度大概还能持续多久</p>
                      <p class="text">${escapeHtml(item.heatWindow)}</p>
                      <p class="label">更具体的用户需求</p>
                      <p class="text">${escapeHtml(item.userDemand)}</p>
                      <p class="label">中国大陆用户画像</p>
                      <p class="text">${escapeHtml(item.persona)}</p>
                      <p class="label">具体使用场景</p>
                      <p class="text">${escapeHtml(item.scenario)}</p>
                      <p class="label">用户动作拆解</p>
                      <p class="text">${escapeHtml(item.userActionChain)}</p>
                      <p class="label">动作真实性判断</p>
                      <p class="text">${escapeHtml(item.actionValidation)}</p>
                      <p class="label">可切入的小程序机会</p>
                      <p class="text">${escapeHtml(item.miniappOpportunity)}</p>
                      <p class="label">竞品/替代方案</p>
                      <p class="text">${escapeHtml(item.competitors)}</p>
                      <p class="label">为什么用户不用竞品而用我们</p>
                      <p class="text">${escapeHtml(item.whyUseMiniapp)}</p>
                    </div>
                  </details>
                  <details class="analysis">
                    <summary>展开两轮评审与研发边界</summary>
                    <div class="detail-body">
                      <p class="label">需求评审第 1 轮</p>
                      <p class="text">${escapeHtml(item.demandReviewRound1 || item.criticReview)}</p>
                      <p class="label">需求评审第 2 轮</p>
                      <p class="text">${escapeHtml(item.demandReviewRound2 || item.criticRevision)}</p>
                      <p class="label">技术评审第 1 轮</p>
                      <p class="text">${escapeHtml(item.techReviewRound1 || item.feasibilityNotes)}</p>
                      <p class="label">技术评审第 2 轮</p>
                      <p class="text">${escapeHtml(item.techReviewRound2 || item.developmentReviewResult || item.feasibilityNotes)}</p>
                      <p class="label">我们能否解决需求</p>
                      <p class="text">${escapeHtml(item.canSolve)}</p>
                      <p class="label">实现/版权/数据限制</p>
                      <p class="text">${escapeHtml(item.feasibilityNotes)}</p>
                    </div>
                  </details>
                  <div class="meta">
                    <span class="tag green">广告：${escapeHtml(item.adPotential)}</span>
                    <span class="tag amber">难度：${escapeHtml(item.difficulty)}</span>
                  </div>
                  <div class="actions">
                    <button class="mini-button favorite ${active ? "active" : ""}" data-action="favorite" data-id="${escapeHtml(item.id)}" type="button">${active ? "已收藏" : "收藏"}</button>
                    <button class="mini-button copy" data-action="copy" data-id="${escapeHtml(item.id)}" type="button">复制点子</button>
                  </div>
                </section>
              </article>
            `;
          })
          .join("");

        els.favoritesOnly.textContent = state.favoritesOnly ? "显示全部" : "只看收藏";
        els.favoritesOnly.className = state.favoritesOnly ? "action primary" : "action";
        els.empty.style.display = items.length ? "none" : "block";
        renderStats(items);
        renderToc(items);
      }

      function setupPlatforms() {
        const platforms = [...new Set(state.items.flatMap((item) => item.platforms || []))].sort();
        els.platform.innerHTML =
          '<option value="">全部平台</option>' +
          platforms.map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
      }

      function resetFilters() {
        els.search.value = "";
        els.priority.value = "";
        els.platform.value = "";
        state.favoritesOnly = false;
        state.decisionFilter = "all";
        els.decisionTabs.forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.decisionFilter === "all");
        });
      }

      function loadReport(path) {
        return fetch(path, { cache: "no-store" })
          .then((res) => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
          })
          .then((data) => {
            state.items = Array.isArray(data.items) ? data.items : [];
            els.summary.textContent = data.summary || "已读取热点报告。";
            els.generatedAt.textContent = `生成时间：${data.generatedAt || "-"}`;
            setupPlatforms();
            render();
          });
      }

      function setupHistory() {
        fetch("data/history.json", { cache: "no-store" })
          .then((res) => (res.ok ? res.json() : { reports: [] }))
          .then((data) => {
            const reports = Array.isArray(data.reports) ? data.reports : [];
            els.historySelect.innerHTML =
              '<option value="data/latest.json">今日热点</option>' +
              reports
                .map((report) => {
                  const path = report.path || "data/latest.json";
                  const label = `${report.date || "历史报告"}｜${report.summary || `${report.itemCount || 0} 条机会`}`;
                  return `<option value="${escapeHtml(path)}">${escapeHtml(label)}</option>`;
                })
                .join("");
            els.historyStatus.textContent = reports.length
              ? `可查看 ${reports.length} 份历史报告。`
              : "暂无历史报告，首次自动化运行后会开始沉淀。";
          })
          .catch((error) => {
            els.historyStatus.textContent = `历史列表读取失败：${error.message}`;
          });
      }

      els.feed.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const id = button.dataset.id;
        const item = state.items.find((entry) => entry.id === id);
        if (!item) return;

        if (button.dataset.action === "source-toggle") {
          if (state.expandedSources.has(id)) state.expandedSources.delete(id);
          else state.expandedSources.add(id);
          render();
          return;
        }

        if (button.dataset.action === "rank-toggle") {
          if (state.expandedRanks.has(id)) state.expandedRanks.delete(id);
          else state.expandedRanks.add(id);
          render();
          return;
        }

        if (button.dataset.action === "favorite") {
          if (state.favorites.has(id)) state.favorites.delete(id);
          else state.favorites.add(id);
          saveFavorites();
          render();
          return;
        }

        if (button.dataset.action === "copy") {
          try {
            await copyIdea(item);
          } catch (error) {
            showToast(`复制失败：${error.message}`);
          }
        }
      });

      [els.search, els.priority, els.platform].forEach((el) => {
        el.addEventListener("input", render);
      });

      els.favoritesOnly.addEventListener("click", () => {
        state.favoritesOnly = !state.favoritesOnly;
        render();
      });

      els.decisionTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          state.decisionFilter = tab.dataset.decisionFilter || "all";
          els.decisionTabs.forEach((entry) => {
            entry.classList.toggle("active", entry === tab);
          });
          render();
        });
      });

      els.historySelect.addEventListener("change", () => {
        resetFilters();
        loadReport(els.historySelect.value).catch((error) => {
          els.summary.textContent = `读取历史报告失败：${error.message}`;
          render();
        });
      });

      els.latestButton.addEventListener("click", () => {
        els.historySelect.value = "data/latest.json";
