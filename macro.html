<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金融宏观</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --panel-soft: #f9fafb;
        --text: #1f2933;
        --muted: #687386;
        --line: #dde3ea;
        --teal: #10756e;
        --teal-soft: #e6f4f2;
        --amber: #a16207;
        --amber-soft: #fff7d6;
        --coral: #c2410c;
        --coral-soft: #fff0e7;
        --green: #166534;
        --green-soft: #e8f6ed;
        --shadow: 0 18px 45px rgba(31, 41, 51, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 12% 0%, rgba(16, 117, 110, 0.12), transparent 30%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 34%, var(--bg) 100%);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 22px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        padding: 16px 0 20px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.08;
      }

      .subline {
        margin: 12px 0 0;
        max-width: 820px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.65;
      }

      .hero-panel {
        width: min(380px, 100%);
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .hero-panel strong {
        display: block;
        margin-bottom: 6px;
        font-size: 22px;
      }

      .hero-panel span {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .page-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 14px;
      }

      .page-tab {
        display: inline-flex;
        align-items: center;
        height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #344054;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      .page-tab.active {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 14px;
      }

      .metric {
        min-height: 76px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric b {
        display: block;
        font-size: 24px;
        line-height: 1;
      }

      .metric span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
        gap: 14px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 12px 28px rgba(31, 41, 51, 0.06);
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
      }

      .panel-title {
        margin: 0;
        font-size: 15px;
        font-weight: 900;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .control {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 0 10px;
      }

      .calendar {
        display: grid;
      }

      .event {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr) 150px;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .event:last-child {
        border-bottom: 0;
      }

      .event-date {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .event-date b {
        display: block;
        color: var(--text);
        font-size: 15px;
      }

      .event-main h2 {
        margin: 0 0 6px;
        font-size: 16px;
        line-height: 1.35;
      }

      .event-main p {
        margin: 0;
        color: #344054;
        font-size: 13px;
        line-height: 1.55;
      }

      .badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--panel-soft);
        color: #344054;
        font-size: 12px;
        font-weight: 800;
      }

      .badge.green {
        background: var(--green-soft);
        color: var(--green);
      }

      .badge.amber {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .badge.coral {
        background: var(--coral-soft);
        color: var(--coral);
      }

      .actuals {
        display: grid;
        gap: 6px;
        align-content: start;
      }

      .actual {
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        font-size: 12px;
      }

      .actual b {
        display: block;
        margin-bottom: 3px;
        color: var(--muted);
      }

      .source-list,
      .ratio-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .source,
      .ratio {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .source b,
      .ratio b {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .source span,
      .ratio span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .empty {
        display: none;
        padding: 30px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 980px) {
        .hero,
        .layout {
          grid-template-columns: 1fr;
        }

        .hero-panel {
          width: 100%;
        }

        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .event {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .app {
          padding: 14px;
        }

        .stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">每日自动更新宏观日历</p>
          <h1>金融宏观</h1>
          <p class="subline" id="summary">正在读取宏观数据...</p>
        </div>
        <aside class="hero-panel">
          <strong id="generatedAt">生成时间：-</strong>
          <span>把非农、CPI/PPI、利率、贵金属与能源比例等数据放到一个日历里，重点看预期、实际和超预期方向。</span>
        </aside>
      </header>

      <nav class="page-tabs" aria-label="报告页面">
        <a class="page-tab" href="./index.html">今日热点</a>
        <a class="page-tab active" href="./macro.html">金融宏观</a>
      </nav>

      <section class="stats" aria-label="宏观概览">
        <div class="metric">
          <b id="eventCount">0</b>
          <span>日历事件</span>
        </div>
        <div class="metric">
          <b id="actualCount">0</b>
          <span>已公布数据</span>
        </div>
        <div class="metric">
          <b id="sourceCount">0</b>
          <span>数据源</span>
        </div>
        <div class="metric">
          <b id="watchCount">0</b>
          <span>重点关注</span>
        </div>
      </section>

      <section class="layout">
        <div class="panel">
          <div class="panel-head">
            <p class="panel-title">宏观日历</p>
            <div class="toolbar">
              <select class="control" id="countryFilter">
                <option value="">全部国家/地区</option>
              </select>
              <select class="control" id="statusFilter">
                <option value="">全部状态</option>
                <option value="released">已公布</option>
                <option value="watch">待接 API</option>
              </select>
            </div>
          </div>
          <div class="calendar" id="calendar"></div>
          <div class="empty" id="empty">暂无符合筛选条件的宏观事件。</div>
        </div>

        <aside class="panel">
          <div class="panel-head">
            <p class="panel-title">比例与数据源</p>
          </div>
          <div class="ratio-list" id="ratioList"></div>
          <div class="source-list" id="sourceList"></div>
        </aside>
      </section>
    </main>

    <script>
      const state = {
        events: [],
        ratios: [],
        sources: [],
      };

      const els = {
        summary: document.querySelector("#summary"),
        generatedAt: document.querySelector("#generatedAt"),
        eventCount: document.querySelector("#eventCount"),
        actualCount: document.querySelector("#actualCount"),
        sourceCount: document.querySelector("#sourceCount"),
        watchCount: document.querySelector("#watchCount"),
        countryFilter: document.querySelector("#countryFilter"),
        statusFilter: document.querySelector("#statusFilter"),
        calendar: document.querySelector("#calendar"),
        empty: document.querySelector("#empty"),
        ratioList: document.querySelector("#ratioList"),
        sourceList: document.querySelector("#sourceList"),
      };

      function text(value) {
        return value == null || value === "" ? "-" : String(value);
      }

      function escapeHtml(value) {
        return text(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function surpriseTone(value) {
        if (/超出|高于|偏强/.test(text(value))) return "coral";
        if (/不及|低于|偏弱/.test(text(value))) return "green";
        return "amber";
      }

      function eventMatches(event) {
        if (els.countryFilter.value && event.country !== els.countryFilter.value) return false;
        if (els.statusFilter.value === "released" && event.status !== "released") return false;
        if (els.statusFilter.value === "watch" && event.status !== "watch") return false;
        return true;
      }

      function render() {
        const events = state.events.filter(eventMatches);
        els.calendar.innerHTML = events
          .map((event) => {
            const actuals = [
              ["预期", event.expected],
              ["实际", event.actual],
              ["前值", event.previous],
            ];
            return `
              <article class="event">
                <div class="event-date">
                  <b>${escapeHtml(event.date || "-")}</b>
                  <span>${escapeHtml(event.time || event.period || "-")}</span>
                </div>
                <div class="event-main">
                  <h2>${escapeHtml(event.title)}</h2>
                  <p>${escapeHtml(event.notes)}</p>
                  <div class="badge-row">
                    <span class="badge">${escapeHtml(event.country)}</span>
                    <span class="badge">${escapeHtml(event.category)}</span>
                    <span class="badge ${event.status === "released" ? "green" : "amber"}">${event.status === "released" ? "已公布" : "待接 API"}</span>
                    <span class="badge ${surpriseTone(event.surprise)}">${escapeHtml(event.surprise)}</span>
                  </div>
                </div>
                <div class="actuals">
                  ${actuals
                    .map(([label, value]) => `<div class="actual"><b>${label}</b>${escapeHtml(value)}</div>`)
                    .join("")}
                </div>
              </article>
            `;
          })
          .join("");
        els.empty.style.display = events.length ? "none" : "block";

        els.ratioList.innerHTML = state.ratios
          .map(
            (ratio) => `
              <div class="ratio">
                <b>${escapeHtml(ratio.name)}：${escapeHtml(ratio.value)}</b>
                <span>${escapeHtml(ratio.notes)}</span>
              </div>
            `,
          )
          .join("");

        els.sourceList.innerHTML = state.sources
          .map(
            (source) => `
              <div class="source">
                <b>${escapeHtml(source.name)}</b>
                <span>${escapeHtml(source.status)} · ${escapeHtml(source.usage)}</span>
              </div>
            `,
          )
          .join("");
      }

      function setupFilters() {
        const countries = [...new Set(state.events.map((event) => event.country).filter(Boolean))].sort();
        els.countryFilter.innerHTML =
          '<option value="">全部国家/地区</option>' +
          countries.map((country) => `<option value="${escapeHtml(country)}">${escapeHtml(country)}</option>`).join("");
      }

      fetch("data/macro-latest.json", { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then((data) => {
          state.events = Array.isArray(data.events) ? data.events : [];
          state.ratios = Array.isArray(data.ratios) ? data.ratios : [];
          state.sources = Array.isArray(data.sources) ? data.sources : [];
          els.summary.textContent = data.summary || "已读取金融宏观日历。";
          els.generatedAt.textContent = `生成时间：${data.generatedAt || "-"}`;
          els.eventCount.textContent = state.events.length;
          els.actualCount.textContent = state.events.filter((event) => event.status === "released").length;
          els.sourceCount.textContent = state.sources.length;
          els.watchCount.textContent = state.events.filter((event) => event.importance === "high").length;
          setupFilters();
          render();
        })
        .catch((error) => {
          els.summary.textContent = `宏观数据读取失败：${error.message}`;
          render();
        });

      [els.countryFilter, els.statusFilter].forEach((el) => el.addEventListener("input", render));
    </script>
  </body>
</html>
