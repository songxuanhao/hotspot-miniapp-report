<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金融宏观</title>
    <style>
      :root {
        --bg: #f4f6f5;
        --ink: #111827;
        --muted: #667085;
        --line: #d7dee4;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --deep: #102033;
        --deep-2: #172a3f;
        --teal: #0f766e;
        --teal-soft: #e4f3f1;
        --red: #b42318;
        --red-soft: #fff0ed;
        --green: #166534;
        --green-soft: #e8f6ed;
        --blue: #175cd3;
        --blue-soft: #eef4ff;
        --amber: #a15c07;
        --amber-soft: #fff7df;
        --purple: #6941c6;
        --purple-soft: #f4f0ff;
        --shadow: 0 18px 46px rgba(16, 32, 51, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, rgba(16, 32, 51, 0.06), rgba(244, 246, 245, 0) 360px),
          var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
      }

      a {
        color: inherit;
      }

      .app {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 14px;
      }

      .page-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .page-tab {
        display: inline-flex;
        align-items: center;
        height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: #344054;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      .page-tab.active {
        border-color: var(--deep);
        background: var(--deep);
        color: #fff;
      }

      .generated {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 14px;
        margin-bottom: 14px;
      }

      .hero-main,
      .now-panel,
      .panel,
      .decision-card,
      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .hero-main {
        display: grid;
        align-content: space-between;
        min-height: 238px;
        padding: 20px;
        background:
          linear-gradient(135deg, rgba(16, 32, 51, 0.96), rgba(23, 42, 63, 0.94)),
          var(--deep);
        color: #fff;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #9ee5db;
        font-size: 13px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: 48px;
        line-height: 1.05;
      }

      .summary {
        max-width: 900px;
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        line-height: 1.65;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 20px;
      }

      .hero-metric {
        min-height: 72px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .hero-metric b {
        display: block;
        font-size: 22px;
      }

      .hero-metric span {
        display: block;
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        line-height: 1.35;
      }

      .now-panel {
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .now-panel h2,
      .panel-title {
        margin: 0;
        font-size: 16px;
        font-weight: 900;
      }

      .signal-list {
        display: grid;
        gap: 8px;
      }

      .signal {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      .signal b {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .signal span {
        display: -webkit-box;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .decision-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .decision-card {
        display: grid;
        gap: 10px;
        min-height: 210px;
        padding: 14px;
        border-top: 4px solid var(--blue);
      }

      .decision-card.defensive {
        border-top-color: var(--red);
      }

      .decision-card.risk {
        border-top-color: var(--green);
      }

      .decision-card.neutral {
        border-top-color: var(--blue);
      }

      .decision-kicker {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .decision-card h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.35;
      }

      .inclination {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.5;
      }

      .decision-card details {
        border-top: 1px solid var(--line);
        padding-top: 8px;
      }

      .decision-card summary {
        cursor: pointer;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      .decision-card ul {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .how-use {
        margin: 8px 0 0;
        color: var(--ink);
        font-size: 12px;
        line-height: 1.55;
      }

      .related-news {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .related-news b {
        font-size: 12px;
      }

      .news-link {
        display: block;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.45;
        text-decoration: none;
      }

      .news-link span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .news-button {
        width: 100%;
        cursor: pointer;
        text-align: left;
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 14px;
        align-items: start;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .control {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 0 10px;
        font-weight: 800;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        border-top: 1px solid var(--line);
        border-left: 1px solid var(--line);
      }

      .weekday,
      .day-cell {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .weekday {
        padding: 9px 10px;
        background: #eef2f4;
        color: #475467;
        font-size: 12px;
        font-weight: 900;
      }

      .day-cell {
        min-height: 174px;
        padding: 8px;
        background: #fff;
      }

      .day-cell.outside {
        background: #f8fafb;
        color: #98a2b3;
      }

      .day-num {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 900;
      }

      .day-count {
        color: var(--muted);
        font-size: 11px;
      }

      .cal-item {
        display: grid;
        gap: 4px;
        width: 100%;
        margin: 0 0 6px;
        padding: 7px;
        border: 1px solid var(--line);
        border-left: 4px solid var(--blue);
        border-radius: 8px;
        background: var(--panel-2);
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .cal-item.data {
        border-left-color: var(--red);
        background: var(--red-soft);
      }

      .cal-item.news {
        border-left-color: var(--purple);
        background: var(--purple-soft);
      }

      .cal-item.market {
        border-left-color: var(--blue);
        background: var(--blue-soft);
      }

      .cal-title {
        overflow: hidden;
        color: var(--ink);
        font-size: 12px;
        font-weight: 900;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cal-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .pill {
        display: inline-flex;
        min-height: 20px;
        align-items: center;
        padding: 2px 6px;
        border-radius: 999px;
        background: #fff;
        color: #344054;
        font-size: 11px;
        font-weight: 900;
      }

      .pill.red {
        color: var(--red);
      }

      .pill.green {
        color: var(--green);
      }

      .pill.blue {
        color: var(--blue);
      }

      .pill.purple {
        color: var(--purple);
      }

      .more {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .detail {
        display: none;
        padding: 14px;
        border-top: 1px solid var(--line);
        background: #fff;
      }

      .detail.show {
        display: block;
      }

      .detail h2 {
        margin: 0 0 8px;
        font-size: 19px;
      }

      .detail-sub {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .data-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 10px 0;
      }

      .data-box,
      .read-item,
      .asset-card {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      .data-box b,
      .read-item b,
      .asset-card b {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .data-box span,
      .read-item span,
      .asset-card span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .side {
        display: grid;
        gap: 14px;
      }

      .side-body,
      .asset-grid,
      .briefing-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .asset-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .explain-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .explain-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .explain-card summary {
        cursor: pointer;
        padding: 10px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 900;
      }

      .explain-card p {
        margin: 0;
        padding: 0 10px 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .indicator-explain {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .indicator-explain summary {
        cursor: pointer;
        padding: 10px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      .indicator-explain .explain-body {
        display: grid;
        gap: 8px;
        padding: 0 10px 10px;
      }

      .empty {
        display: none;
        padding: 30px;
        color: var(--muted);
        text-align: center;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(16, 32, 51, 0.5);
      }

      .modal-backdrop.show {
        display: flex;
      }

      .news-modal {
        width: min(680px, 100%);
        max-height: min(720px, 88vh);
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 26px 80px rgba(16, 32, 51, 0.26);
      }

      .modal-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .modal-head h2 {
        margin: 0;
        font-size: 20px;
        line-height: 1.35;
      }

      .modal-close {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }

      .modal-body {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .shell {
        width: min(1440px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 42px;
      }

      .cockpit-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px;
        gap: 18px;
        align-items: stretch;
        padding: 22px;
        border-radius: 10px;
        background: #101828;
        color: #fff;
      }

      .cockpit-hero h1 {
        margin: 6px 0 8px;
        font-size: clamp(26px, 4vw, 44px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .hero-reason {
        max-width: 920px;
        margin: 0;
        color: #d0d5dd;
        font-size: 15px;
        line-height: 1.65;
      }

      .hero-meta {
        display: grid;
        align-content: space-between;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: #d0d5dd;
        font-size: 13px;
        font-weight: 800;
      }

      .asset-actions,
      .evidence-grid,
      .watchlist,
      .asset-temperature,
      .risk-schedule,
      .evidence-list {
        display: grid;
        gap: 10px;
      }

      .asset-actions {
        grid-template-columns: repeat(4, minmax(0, max-content));
        margin-top: 14px;
      }

      .action-chip {
        padding: 7px 10px;
        border-radius: 999px;
        background: #f2f4f7;
        color: #344054;
        font-size: 12px;
        font-weight: 900;
      }

      .cockpit-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 14px;
        margin-top: 14px;
        align-items: start;
      }

      .main-column,
      .side-column {
        display: grid;
        gap: 14px;
      }

      .evidence-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .evidence-card,
      .watch-card,
      .schedule-item,
      .temperature-card,
      .evidence-note {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 12px;
      }

      .evidence-card b,
      .watch-card b,
      .temperature-card b {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
      }

      .evidence-card p,
      .watch-card p,
      .schedule-item p,
      .temperature-card span,
      .evidence-note span {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .split-evidence {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }

      .split-evidence > div:first-child {
        border-right: 1px solid var(--line);
      }

      .panel-head.compact {
        padding: 13px 14px;
      }

      .risk-schedule {
        padding: 12px;
      }

      .schedule-item {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr) 110px;
        gap: 10px;
        align-items: center;
      }

      .side-column {
        position: sticky;
        top: 12px;
        max-height: calc(100vh - 24px);
        overflow: auto;
      }

      .collapsed-panel {
        padding: 0;
      }

      .collapsed-panel summary {
        cursor: pointer;
        padding: 13px 14px;
        font-weight: 900;
      }

      .calendar-drawer {
        border-top: 1px solid var(--line);
      }

      .calendar-drawer summary {
        cursor: pointer;
        padding: 12px 14px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      @media (max-width: 1180px) {
        .hero,
        .workbench {
          grid-template-columns: 1fr;
        }

        .decision-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 1120px) {
        .cockpit-hero,
        .cockpit-grid,
        .split-evidence {
          grid-template-columns: 1fr;
        }

        .side-column {
          position: static;
          max-height: none;
        }

        .evidence-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 12px;
        }

        .topbar,
        .panel-head {
          align-items: stretch;
          flex-direction: column;
        }

        h1 {
          font-size: 34px;
        }

        .hero-metrics,
        .decision-grid,
        .asset-grid,
        .data-row {
          grid-template-columns: 1fr;
        }

        .calendar-grid {
          display: block;
          border: 0;
        }

        .weekday {
          display: none;
        }

        .day-cell {
          min-height: auto;
          margin-bottom: 8px;
          border: 1px solid var(--line);
          border-radius: 8px;
        }

        .day-cell.outside {
          display: none;
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 20px, 1440px);
          padding-top: 12px;
        }

        .asset-actions,
        .evidence-grid,
        .schedule-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="cockpit-hero">
        <div>
          <p class="eyebrow">每日金融宏观</p>
          <h1 id="headlineDecision">正在生成宏观判断</h1>
          <p class="hero-reason" id="headlineReason">读取最新宏观数据、新闻和资产温度...</p>
          <div class="asset-actions" id="assetActions"></div>
        </div>
        <div class="hero-meta">
          <span id="generatedAt">--</span>
          <span id="dataHealth">数据源检查中</span>
        </div>
      </section>

      <nav class="page-tabs" aria-label="报告页面">
        <a class="page-tab" href="./index.html">今日热点</a>
        <a class="page-tab active" href="./macro.html">金融宏观</a>
      </nav>

      <section class="cockpit-grid">
        <div class="main-column">
          <section class="evidence-grid" id="evidenceCards"></section>

          <section class="panel split-evidence">
            <div>
              <div class="panel-head compact">
                <p class="panel-title">支持当前判断</p>
              </div>
              <div class="evidence-list" id="supportEvidence"></div>
            </div>
            <div>
              <div class="panel-head compact">
                <p class="panel-title">反向证据</p>
              </div>
              <div class="evidence-list" id="counterEvidence"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <p class="panel-title" id="calendarTitle">7 天风险日程</p>
              <div class="toolbar">
                <select class="control" id="typeFilter">
                  <option value="">全部</option>
                  <option value="data">只看数据</option>
                  <option value="news">只看新闻</option>
                </select>
                <select class="control" id="impactFilter">
                  <option value="">全部影响</option>
                  <option value="rates">利率/美元</option>
                  <option value="inflation">通胀/商品</option>
                  <option value="risk">避险/风险</option>
                  <option value="crypto">币圈</option>
                </select>
              </div>
            </div>
            <div class="risk-schedule" id="riskSchedule"></div>
            <details class="calendar-drawer">
              <summary>查看完整月历</summary>
              <div class="calendar-grid" id="calendar"></div>
            </details>
            <div class="empty" id="empty">当前筛选下没有风险事件。</div>
            <div class="detail" id="detail"></div>
          </section>
        </div>

        <aside class="side-column">
          <section class="panel">
            <div class="panel-head compact">
              <p class="panel-title">今日 / 本周必盯</p>
            </div>
            <div class="watchlist" id="watchlist"></div>
          </section>

          <section class="panel">
            <div class="panel-head compact">
              <p class="panel-title">资产温度</p>
            </div>
            <div class="asset-temperature" id="assetGrid"></div>
          </section>

          <details class="panel collapsed-panel">
            <summary>指标解释库</summary>
            <div class="explain-list" id="explainList"></div>
          </details>

          <details class="panel collapsed-panel">
            <summary>系统状态</summary>
            <div class="side-body" id="sourceGrid"></div>
          </details>
        </aside>
      </section>

    <script>
      const state = {
        events: [],

        ratios: [],
        rateMetrics: [],

      const els = {
        summary: document.querySelector("#summary"),
        headlineDecision: document.querySelector("#headlineDecision"),

        cryptoMood: document.querySelector("#cryptoMood"),
        signalList: document.querySelector("#signalList"),
        questionGrid: document.querySelector("#questionGrid"),
        calendarTitle: document.querySelector("#calendarTitle"),
        typeFilter: document.querySelector("#typeFilter"),
        impactFilter: document.querySelector("#impactFilter"),
        calendar: document.querySelector("#calendar"),
        empty: document.querySelector("#empty"),
        detail: document.querySelector("#detail"),
        briefingList: document.querySelector("#briefingList"),
        assetGrid: document.querySelector("#assetGrid"),
        explainList: document.querySelector("#explainList"),
        sourceGrid: document.querySelector("#sourceGrid"),
        newsModal: document.querySelector("#newsModal"),

      };

      const INDICATOR_EXPLANATIONS = [
        {
          keys: ["nbs-china-cpi", "中国CPI", "中国 CPI"],

          read: "CPI 上升通常代表消费端价格上涨，过高会带来通胀压力；CPI 下行则可能提示需求偏弱或通缩压力。",
          asset: "温和上行通常对企业收入和股市不差；持续过高会压制政策宽松空间，持续过低则说明内需偏弱。"
        },
        {
          keys: ["nbs-china-ppi", "中国PPI", "中国 PPI"],
          name: "中国 PPI",
          what: "生产者价格指数，反映工业生产领域价格变化，能观察企业成本、利润和上游原材料压力。",
          read: "PPI 上升说明生产成本抬升，若企业无法转嫁给消费者，利润会被压缩；PPI 低迷说明工业需求或价格承压。",
          asset: "PPI 明显高于预期偏通胀，明显低于预期偏通缩。结合 CPI 看，能判断价格压力是否从生产端传到消费端。"
        },
        {
          keys: ["中国PMI", "PMI"],
          name: "中国 PMI",
          what: "制造业采购经理人指数，覆盖订单、生产、库存、就业等，属于宏观经济的先导指标。",
          read: "50 是荣枯线，大于 50 偏景气，小于 50 偏不景气。新订单改善、库存下降，通常说明经济动能在修复。",
          asset: "PMI 连续改善更支持权益资产；PMI 持续低于 50，往往意味着增长压力仍在。"
        },
        {
          keys: ["社融", "M1", "M2", "LPR"],
          name: "社融 / M1 / M2 / LPR",
          what: "社融衡量实体经济拿到的总融资，M1 更贴近企业活跃资金，M2 是广义货币供给，LPR 是中国贷款定价锚。",
          read: "社融和 M1 改善说明信用和经营活跃度修复；M2 高但 M1 弱，常见于钱多但实体投资意愿不足。",
          asset: "信用扩张通常利好权益和地产链；信用偏弱则说明宽松传导还不顺。"
        },
        {
          keys: ["fred-cpi-yoy", "美国CPI"],
          name: "美国 CPI",
          what: "美国消费者物价指数，是市场观察美国通胀压力的重要指标。",
          read: "CPI 高或反弹，会压低降息预期并推高名义利率；CPI 回落，通常支持宽松预期。",
          asset: "高通胀偏利多美元和美债收益率，压制黄金、成长股和币圈；通胀降温则相反。"
        },
        {
          keys: ["fred-pce-yoy", "fred-core-pce-yoy", "PCE", "核心PCE"],
          name: "美国 PCE / 核心 PCE",
          what: "PCE 是个人消费支出物价指数，核心 PCE 剔除食品和能源，是美联储更偏好的通胀口径。",
          read: "核心 PCE 高于 2% 且不降温，说明美联储维持紧政策的理由还在；持续降温则支持降息叙事。",
          asset: "核心 PCE 偏高通常利好美元、压制黄金；低于目标或快速降温通常利好黄金和风险资产。"
        },
        {
          keys: ["fred-payems", "非农", "fred-icsa", "fred-unrate", "失业率"],
          name: "美国就业：非农 / 初请 / 失业率",
          what: "非农反映就业新增，初请失业金是高频就业降温信号，失业率反映劳动力市场整体状态。",
          read: "就业强会推迟降息，弱就业会强化宽松预期；但过弱也可能变成衰退交易。",
          asset: "强就业偏利多美元、利空黄金；就业温和降温通常利好风险资产，急剧恶化则偏避险。"
        },
        {
          keys: ["10Y-2Y", "10年国债", "实际利率", "收益率"],
          name: "收益率曲线 / 实际利率",
          what: "10Y-2Y、10Y-3M、30Y-10Y 等利差用来观察政策强度、增长预期和衰退风险；实际利率是黄金的重要锚。",
          read: "曲线倒挂说明短端政策利率压得高，经济压力较大；实际利率上行会提高持有黄金的机会成本。",
          asset: "实际利率上行通常压制黄金和成长资产；曲线从倒挂转陡，要分清是复苏转陡还是衰退降息转陡。"
        },
        {
          keys: ["金银比", "金油比", "金特比", "BTC 约合"],
          name: "金银比 / 金油比 / 金特比",
          what: "金银比看避险与工业需求，金油比看黄金相对能源和增长预期，金特比看 BTC 相对黄金的强弱。",
          read: "金银比、金油比上行通常偏避险或增长担忧；金特比上行说明 BTC 相对黄金更强，风险偏好更足。",
          asset: "这些比值要看趋势和共振，单日变化噪音很大，多个比值同向时参考价值更高。"
        }
      ];

      function numberFrom(value) {
        const match = String(value || "").replaceAll(",", "").match(/-?\d+(\.\d+)?/);
        return match ? Number(match[0]) : null;
      }

      function metricByName(items, needle) {
        return (items || []).find((item) => String(item?.name || "").includes(needle));
      }

      function eventById(id) {
        return (state.events || []).find((event) => event.id === id);
      }

      function buildHeadlineDecision() {
        const realRate = metricByName(state.rateMetrics, "实际利率");
        const dxy = metricByName(state.prices, "美元指数");
        const vix = metricByName(state.prices, "VIX");
        const fng = metricByName(state.cryptoMetrics, "恐慌贪婪");
        const goldOil = metricByName(state.ratios, "金油比");
        const ethBtc = metricByName(state.ratios, "ETH/BTC");
        const realRateValue = numberFrom(realRate?.value);
        const dxyValue = numberFrom(dxy?.value);
        const vixValue = numberFrom(vix?.value);
        const fngValue = numberFrom(fng?.value);

        const defensiveVotes = [];
        const riskVotes = [];

        if (realRateValue != null && realRateValue >= 2) defensiveVotes.push("实际利率仍高，黄金和风险资产都承压");
        if (dxyValue != null && dxyValue >= 98) defensiveVotes.push("美元指数不弱，全球流动性偏紧");
        if ((goldOil?.changePct || 0) > 5) defensiveVotes.push("金油比上行，增长担忧或避险需求抬头");
        if ((ethBtc?.changePct || 0) < 0) defensiveVotes.push("ETH/BTC 走弱，币圈内部风险偏好不足");

        if (vixValue != null && vixValue < 18) riskVotes.push("VIX 不高，市场还不是系统性恐慌");
        if (fngValue != null && fngValue > 25 && fngValue < 75) riskVotes.push("币圈情绪未到极端，不适合硬做反转");

        let headline = "偏观望，等待关键数据确认";
        if (defensiveVotes.length >= 3 && riskVotes.length) headline = "偏防守，但不是极端避险";
        else if (defensiveVotes.length >= 3) headline = "偏防守，优先控制风险";
        else if (riskVotes.length >= 2 && defensiveVotes.length <= 1) headline = "偏中性，风险偏好尚未恶化";

        return {
          headline,
          reason: [...defensiveVotes.slice(0, 2), ...riskVotes.slice(0, 1)].join("；") || "核心指标分歧较大，今天先看关键数据和新闻是否给出方向。",
          actions: [
            { label: "黄金", value: defensiveVotes.length >= 2 ? "观察偏多" : "等实际利率" },
            { label: "BTC", value: (ethBtc?.changePct || 0) < 0 ? "不追" : "观察资金流" },
            { label: "美股", value: vixValue != null && vixValue < 18 ? "等数据" : "控回撤" },
            { label: "现金", value: "保留机动" },
          ],
          support: defensiveVotes,
          counter: riskVotes,
        };
      }

      function buildEvidenceCards(decision) {
        const realRate = metricByName(state.rateMetrics, "实际利率");
        const dxy = metricByName(state.prices, "美元指数");
        const goldOil = metricByName(state.ratios, "金油比");
        const ethBtc = metricByName(state.ratios, "ETH/BTC");
        const fng = metricByName(state.cryptoMetrics, "恐慌贪婪");
        const vix = metricByName(state.prices, "VIX");
        const realRateValue = numberFrom(realRate?.value);
        const dxyValue = numberFrom(dxy?.value);

        return [
          {
            title: "潮水",
            verdict: (realRateValue != null && realRateValue >= 2) || (dxyValue != null && dxyValue >= 98) ? "偏紧" : "中性",
            note: `${realRate?.value || "实际利率缺失"}；${dxy?.value ? `DXY ${dxy.value}` : "DXY 缺失"}`,
          },
          {
            title: "避险",
            verdict: (goldOil?.changePct || 0) > 5 ? "升温" : "不极端",
            note: goldOil ? `金油比 ${goldOil.value}，近月 ${formatPct(goldOil.changePct)}` : "等待金油比",
          },
          {
            title: "币圈",
            verdict: (ethBtc?.changePct || 0) < 0 ? "偏防守" : "观察扩散",
            note: ethBtc ? `ETH/BTC ${ethBtc.value}，近月 ${formatPct(ethBtc.changePct)}` : "等待 ETH/BTC",
          },
          {
            title: "情绪",
            verdict: "未极端",
            note: `${vix?.value ? `VIX ${vix.value}` : "VIX 缺失"}；${fng?.value ? `恐慌贪婪 ${fng.value}` : "情绪缺失"}`,
          },
        ];
      }

      function buildWatchlist(items) {
        const scored = (items || [])
          .map((item) => {
            const title = item?.title || "";
            let score = 1;
            let why = "只在能解释资产变化时关注";
            if (/PCE|CPI|非农|FOMC|美联储|初请|失业率/.test(title)) {
              score = 3;
              why = "可能改变降息预期和美元/美债方向";
            } else if (/OPEC|原油|中东|伊朗|以色列|俄乌|关税|特朗普/.test(title)) {
              score = 2;
              why = "可能影响通胀、原油和黄金避险需求";
            } else if (/BTC|比特币|ETF|稳定币|ETH/.test(title)) {
              score = 2;
              why = "可能影响币圈资金流和风险偏好";
            }
            return { ...item, score, why };
          })
          .sort((a, b) => b.score - a.score || a.date - b.date);

        return scored.slice(0, 5);
      }

      function sevenDayItems() {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 2);
        const end = new Date(now);
        end.setDate(now.getDate() + 7);
        return calendarItems()
          .filter(itemMatches)
          .filter((item) => item.date >= start && item.date <= end)
          .sort((a, b) => a.date - b.date);
      }

      function formatPct(value) {
        if (typeof value !== "number" || Number.isNaN(value)) return "-";
        return `${value >= 0 ? "+" : ""}${value.toFixed(1)}%`;
      }

      function text(value) {
        return value == null || value === "" ? "-" : String(value);
      }

      function escapeHtml(value) {
        return text(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function parseDate(value) {
        const raw = text(value);
        const zh = raw.match(/(\d{4})年(\d{1,2})月份/);
        if (zh) return new Date(Number(zh[1]), Number(zh[2]) - 1, 1);
        const date = new Date(raw);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function parseNewsDate(value) {
        const date = new Date(text(value));
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function classifyData(event) {
        const title = `${event.title || ""} ${event.category || ""}`;
        if (/非农|失业|就业/.test(title)) return { impact: "rates", tone: "data", why: "就业决定美联储降息/加息叙事，也会影响美元、美债和风险资产。" };
        if (/CPI|PPI|通胀/.test(title)) return { impact: "inflation", tone: "data", why: "通胀决定实际利率和商品定价，通常直接影响黄金、原油、美元和估值。" };
        if (/BTC|ETH|恐慌|市占|加密/.test(title)) return { impact: "crypto", tone: "market", why: "币圈指标用于判断风险偏好、山寨活跃度和资金是否回到 BTC 防守。" };
        return { impact: "risk", tone: "market", why: "用于确认风险偏好和跨资产定价方向。" };
      }

      function classifyNews(news) {
        const buckets = news.buckets || [];
        if (buckets.includes("macro-tide")) return { impact: "rates", tone: "news", label: "宏观" };
        if (buckets.includes("risk-regime")) return { impact: "risk", tone: "news", label: "避险" };
        if (buckets.includes("crypto-rotation") || buckets.includes("sentiment-extreme")) return { impact: "crypto", tone: "news", label: "币圈" };
        return { impact: "risk", tone: "news", label: "新闻" };
      }

      function calendarItems() {
        const dataItems = state.events.map((event) => ({
          id: `data:${event.id}`,
          kind: "data",
          date: parseDate(event.date),
          title: event.title,
          source: event.country || event.source,
          label: event.surprise || "数据",
          raw: event,
          impact: classifyData(event).impact,
        }));
        const newsItems = state.news.map((news, index) => ({
          id: `news:${index}`,
          kind: "news",
          date: parseNewsDate(news.published),
          title: news.titleZh || news.title,
          source: news.source,
          label: classifyNews(news).label,
          raw: news,
          impact: classifyNews(news).impact,
        }));
        return [...dataItems, ...newsItems].filter((item) => item.date);
      }

      function itemMatches(item) {
        if (els.typeFilter.value && item.kind !== els.typeFilter.value) return false;
        if (els.impactFilter.value && item.impact !== els.impactFilter.value) return false;
        return true;
      }

      function monthBase(items) {
        const dates = items.map((item) => item.date).filter(Boolean).sort((a, b) => b - a);
        return dates[0] || new Date();
      }

      function sameDay(a, b) {
        return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }

      function renderCalendar() {
        const items = calendarItems().filter(itemMatches);
        const base = monthBase(items.length ? items : calendarItems());
        const year = base.getFullYear();
        const month = base.getMonth();
        els.calendarTitle.textContent = `${year}年${String(month + 1).padStart(2, "0")}月宏观日历`;
        const first = new Date(year, month, 1);
        const start = new Date(first);
        start.setDate(1 - first.getDay());
        const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
        const cells = weekdays.map((day) => `<div class="weekday">周${day}</div>`);

        for (let index = 0; index < 42; index += 1) {
          const day = new Date(start);
          day.setDate(start.getDate() + index);
          const dayItems = items.filter((item) => sameDay(item.date, day));
          const outside = day.getMonth() !== month;
          cells.push(`
            <div class="day-cell ${outside ? "outside" : ""}">
              <div class="day-num">
                <span>${day.getDate()}</span>
                ${dayItems.length ? `<span class="day-count">${dayItems.length}项</span>` : ""}
              </div>
              ${dayItems.slice(0, 5).map(renderCalendarItem).join("")}
              ${dayItems.length > 5 ? `<div class="more">还有 ${dayItems.length - 5} 项</div>` : ""}
            </div>
          `);
        }
        els.calendar.innerHTML = cells.join("");
        els.empty.style.display = items.length ? "none" : "block";
      }

      function renderCalendarItem(item) {
        const isNews = item.kind === "news";
        const raw = item.raw;
        const badge = isNews ? "purple" : raw.surprise?.includes("上升") || raw.surprise?.includes("多增") ? "red" : raw.surprise?.includes("回落") || raw.surprise?.includes("少增") ? "green" : "blue";
        return `
          <button class="cal-item ${item.kind}" data-id="${escapeHtml(item.id)}" type="button">
            <span class="cal-title">${escapeHtml(item.title)}</span>
            <span class="cal-meta">
              <span class="pill">${escapeHtml(item.source)}</span>
              <span class="pill ${badge}">${escapeHtml(item.label)}</span>
            </span>
          </button>
        `;
      }

      function renderDetail(item) {
        if (!item) {
          els.detail.classList.remove("show");
          els.detail.innerHTML = "";
          return;
        }
        els.detail.classList.add("show");
        if (item.kind === "news") {
          const news = item.raw;
          openNewsModal(news);
          els.detail.classList.remove("show");
          els.detail.innerHTML = "";
          return;
        }
        const event = item.raw;
        const meta = classifyData(event);
        els.detail.innerHTML = `
          <h2>${escapeHtml(event.title)}</h2>
          <p class="detail-sub">${escapeHtml(meta.why)}</p>
          <div class="data-row">
            <div class="data-box"><b>实际</b><span>${escapeHtml(event.actual)}</span></div>
            <div class="data-box"><b>前值</b><span>${escapeHtml(event.previous)}</span></div>
            <div class="data-box"><b>预期</b><span>${escapeHtml(event.expected)}</span></div>
          </div>
          <div class="read-item">
            <b>所以呢</b>
            <span>${escapeHtml(readingFor(event))}</span>
          </div>
          ${renderIndicatorExplanation(event)}
        `;
      }

      function openNewsModal(news) {
        const meta = classifyNews(news);
        const impactText = meta.impact === "rates"
          ? "利率、美元和黄金"
          : meta.impact === "crypto"
            ? "BTC、ETH 和币圈风险偏好"
            : "黄金、原油和整体风险偏好";
        els.modalTitle.textContent = news.titleZh || news.title || "新闻详情";
        els.modalBody.innerHTML = `
          <p class="detail-sub">${escapeHtml(news.source)} · ${escapeHtml(news.published || "-")}</p>
          <div class="read-item">
            <b>它影响什么</b>
            <span>${escapeHtml(impactText)}</span>
          </div>
          <div class="read-item">
            <b>所以呢</b>
            <span>${escapeHtml(news.summaryZh || news.summary || "这条新闻只作为辅助证据，重点看它是否支持或反驳当前总判断。")}</span>
          </div>
          ${news.title && news.title !== news.titleZh ? `<div class="read-item"><b>原始标题</b><span>${escapeHtml(news.title)}</span></div>` : ""}
          ${news.url ? `<a class="news-link" href="${escapeHtml(news.url)}" target="_blank" rel="noopener">打开原文</a>` : ""}
        `;
        els.newsModal.classList.add("show");
      }

      function closeNewsModal() {
        els.newsModal.classList.remove("show");
      }

      function explanationFor(value) {
        const body = `${value?.id || ""} ${value?.name || ""} ${value?.title || ""} ${value?.category || ""} ${value?.notes || ""}`;
        return INDICATOR_EXPLANATIONS.find((item) => item.keys.some((key) => body.includes(key)));
      }

      function renderIndicatorExplanation(event) {
        const explanation = explanationFor(event);
        if (!explanation) return "";
        return `
          <details class="indicator-explain">
            <summary>${escapeHtml(explanation.name)}：指标解释</summary>
            <div class="explain-body">
              <div class="read-item"><b>是什么</b><span>${escapeHtml(explanation.what)}</span></div>
              <div class="read-item"><b>怎么看</b><span>${escapeHtml(explanation.read)}</span></div>
              <div class="read-item"><b>对资产的含义</b><span>${escapeHtml(explanation.asset)}</span></div>
            </div>
          </details>
        `;
      }

      function readingFor(event) {
        const title = `${event.title || ""} ${event.surprise || ""}`;
        if (/非农|就业/.test(title)) return "就业强，降息预期容易后移；就业弱，市场更容易交易宽松和风险偏好修复。看它主要是为了判断美元、美债和成长资产方向。";
        if (/失业/.test(title)) return "失业率上升代表劳动力市场降温，可能支持宽松；失业率稳定则需要结合非农和工资数据判断。";
        if (/CPI|PPI|通胀/.test(title)) return "通胀高会压制降息预期并支撑名义利率；通胀回落通常利好黄金、成长股和风险资产。中国 CPI/PPI 更像需求和工业价格温度计。";
        return "这个指标用于确认宏观背景，不单独做判断，要和价格比值、币圈情绪、新闻叙事一起看。";
      }

      function renderQuestions() {
        if (!els.questionGrid) return;
        const questions = state.questions.length ? state.questions : [];
        els.questionGrid.innerHTML = questions
          .map((question) => `
            <article class="decision-card ${escapeHtml(question.tone || "neutral")}">
              <div>
                <p class="decision-kicker">${escapeHtml(question.subtitle || "")}</p>
                <h2>${escapeHtml(question.title)}</h2>
              </div>
              <p class="inclination">${escapeHtml(question.inclination)}</p>
              <details>
                <summary>依据 / 新闻</summary>
                <ul>${(question.bullets || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                <p class="how-use">${escapeHtml(question.howToUse)}</p>
                ${renderRelatedNews(question.news || [])}
              </details>
            </article>
          `)
          .join("");
      }

      function renderRelatedNews(news) {
        if (!news.length) return `<div class="related-news"><b>相关新闻</b><span class="how-use">暂无匹配新闻。</span></div>`;
        return `
          <div class="related-news">
            <b>相关新闻</b>
            ${news
              .map((item, index) => `
                <button class="news-link news-button" data-related-news="${escapeHtml(encodeURIComponent(JSON.stringify(item)))}" type="button">
                  <span>${escapeHtml(item.source)} ${item.published ? "· " + escapeHtml(item.published) : ""}</span>
                  ${escapeHtml(item.titleZh || item.title)}
                </button>
              `)
              .join("")}
          </div>
        `;
      }

      function renderSignals() {
        if (!els.signalList) return;
        const signals = state.questions.slice(0, 4);
        els.signalList.innerHTML = signals
          .map((question) => `
            <div class="signal">
              <b>${escapeHtml(question.title)}</b>
              <span>${escapeHtml(question.inclination)}</span>
            </div>
          `)
          .join("");
      }

      function renderHeadline() {
        const decision = buildHeadlineDecision();
        if (els.headlineDecision) els.headlineDecision.textContent = decision.headline;
        if (els.headlineReason) els.headlineReason.textContent = decision.reason;
        if (els.assetActions) {
          els.assetActions.innerHTML = decision.actions
            .map((item) => `<span class="action-chip"><b>${escapeHtml(item.label)}</b>：${escapeHtml(item.value)}</span>`)
            .join("");
        }
        if (els.dataHealth) {
          els.dataHealth.textContent = state.sources.some((source) => source.status === "failed")
            ? "部分数据源失败，核心报告可用"
            : "核心数据源正常";
        }
        return decision;
      }

      function renderEvidenceCards(decision) {
        if (els.evidenceCards) {
          els.evidenceCards.innerHTML = buildEvidenceCards(decision)
            .map((card) => `
              <article class="evidence-card">
                <b>${escapeHtml(card.title)}：${escapeHtml(card.verdict)}</b>
                <p>${escapeHtml(card.note)}</p>
              </article>
            `)
            .join("");
        }

        if (els.supportEvidence) {
          els.supportEvidence.innerHTML = (decision.support.length ? decision.support : ["没有足够强的单边证据，先等待关键数据。"])
            .slice(0, 4)
            .map((item) => `<div class="evidence-note"><span>${escapeHtml(item)}</span></div>`)
            .join("");
        }

        if (els.counterEvidence) {
          els.counterEvidence.innerHTML = (decision.counter.length ? decision.counter : ["暂时缺少明显反向证据，但仍需看新闻和数据是否突然转向。"])
            .slice(0, 4)
            .map((item) => `<div class="evidence-note"><span>${escapeHtml(item)}</span></div>`)
            .join("");
        }
      }

      function renderWatchlist() {
        if (!els.watchlist) return;
        const items = buildWatchlist(sevenDayItems());
        els.watchlist.innerHTML = items.length
          ? items.map((item) => `
              <button class="watch-card" data-id="${escapeHtml(item.id)}" type="button">
                <b>${item.score === 3 ? "高" : item.score === 2 ? "中" : "低"}｜${escapeHtml(item.title)}</b>
                <p>${escapeHtml(item.why)}</p>
              </button>
            `).join("")
          : `<div class="watch-card"><b>暂无必盯事件</b><p>当前 7 天窗口内没有足以改变总判断的事件。</p></div>`;
      }

      function renderRiskSchedule() {
        if (!els.riskSchedule) return;
        const nearTerm = sevenDayItems();
        const top = buildWatchlist(nearTerm);
        const topIds = new Set(top.map((item) => item.id));
        const items = top.concat(nearTerm.filter((item) => !topIds.has(item.id))).slice(0, 12);
        els.riskSchedule.innerHTML = items.length
          ? items.map((item) => `
              <button class="schedule-item" data-id="${escapeHtml(item.id)}" type="button">
                <b>${escapeHtml(item.date.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit" }))}</b>
                <p>${escapeHtml(item.title)}</p>
                <span class="pill">${escapeHtml(item.label)}</span>
              </button>
            `).join("")
          : `<div class="schedule-item"><b>-</b><p>当前筛选下没有风险事件。</p><span class="pill">空</span></div>`;
      }

      function renderSide() {
        const briefing = state.dailyBriefing || {};
        const briefingItems = Array.isArray(briefing.items) ? briefing.items : [];
        if (els.briefingList) {
          els.briefingList.innerHTML = briefingItems.length
            ? briefingItems
                .map((item) => `
                  <div class="read-item">
                    <b>${escapeHtml(item.title)}</b>
                    <span>${escapeHtml(briefing.source || "新闻联播")} · ${escapeHtml(briefing.date || "-")}</span>
                  </div>
                `)
                .join("")
            : `<div class="read-item"><b>暂未拉到新闻联播要闻</b><span>不影响四个宏观判断；实时新闻仍会进入日历。</span></div>`;
        }

        const assets = [...state.prices, ...state.ratios, ...state.rateMetrics, ...state.cryptoMetrics];
        els.assetGrid.innerHTML = assets
          .map((asset) => `
            <div class="asset-card">
              <b>${escapeHtml(asset.name)}：${escapeHtml(asset.value)}</b>
              <span>${escapeHtml(asset.notes)}</span>
            </div>
          `)
          .join("");

        els.explainList.innerHTML = INDICATOR_EXPLANATIONS.map((item, index) => `
          <details class="explain-card" ${index < 3 ? "open" : ""}>
            <summary>${escapeHtml(item.name)}</summary>
            <p>${escapeHtml(item.read)}</p>
            <p>${escapeHtml(item.asset)}</p>
          </details>
        `).join("");

        els.sourceGrid.innerHTML = state.sources
          .map((source) => `
            <div class="asset-card">
              <b>${escapeHtml(source.name)}</b>
              <span>${escapeHtml(source.status)} · ${escapeHtml(source.usage)}</span>
            </div>
          `)
          .join("");
      }

      function renderStats() {
        const fear = state.cryptoMetrics.find((item) => item.name.includes("恐慌"));
        const regime = state.questions.find((item) => item.id === "risk-regime");
        if (els.eventCount) els.eventCount.textContent = state.events.length;
        if (els.newsCount) els.newsCount.textContent = state.news.length;
        if (els.cryptoMood) els.cryptoMood.textContent = fear ? fear.value : "-";
        if (els.riskSignal) els.riskSignal.textContent = regime ? (regime.tone === "defensive" ? "偏避险" : regime.tone === "risk" ? "偏冒险" : "分歧") : "-";
      }

      function render() {
        const decision = renderHeadline();
        renderEvidenceCards(decision);
        renderWatchlist();
        renderRiskSchedule();
        renderCalendar();
        renderSide();
        renderStats();
        const selected = calendarItems().find((item) => item.id === state.selectedId);
        const defaultData = sevenDayItems().find((item) => item.kind === "data")
          || calendarItems().find((item) => item.kind === "data");
        renderDetail(selected?.kind === "data" ? selected : defaultData);
      }

      document.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-id]");
        if (!button) return;
        state.selectedId = button.dataset.id;
        renderDetail(calendarItems().find((item) => item.id === state.selectedId));
      });

      document.addEventListener("click", (event) => {
        const related = event.target.closest("button[data-related-news]");
        if (!related) return;
        try {
          openNewsModal(JSON.parse(decodeURIComponent(related.getAttribute("data-related-news"))));
        } catch {
          return;
        }
      });

      els.modalClose.addEventListener("click", closeNewsModal);
      els.newsModal.addEventListener("click", (event) => {
        if (event.target === els.newsModal) closeNewsModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeNewsModal();
      });

      [els.typeFilter, els.impactFilter].forEach((el) => el.addEventListener("input", render));

      fetch("data/macro-latest.json", { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then((data) => {
          state.events = Array.isArray(data.events) ? data.events : [];
          state.news = Array.isArray(data.news) ? data.news : [];
          state.ratios = Array.isArray(data.ratios) ? data.ratios : [];
          state.rateMetrics = Array.isArray(data.rateMetrics) ? data.rateMetrics : [];
          state.prices = Array.isArray(data.prices) ? data.prices : [];
          state.cryptoMetrics = Array.isArray(data.cryptoMetrics) ? data.cryptoMetrics : [];
          state.questions = Array.isArray(data.questions) ? data.questions : [];
          state.dailyBriefing = data.dailyBriefing || null;
          state.sources = Array.isArray(data.sources) ? data.sources : [];
          if (els.summary) els.summary.textContent = data.summary || "已读取金融宏观日历。";
          els.generatedAt.textContent = `生成时间：${data.generatedAt || "-"}`;
          render();
        })
        .catch((error) => {
          if (els.summary) els.summary.textContent = `宏观数据读取失败：${error.message}`;
          render();
        });
    </script>
  </body>
</html>
