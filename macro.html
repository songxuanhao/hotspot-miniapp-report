<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金融宏观</title>
    <style>
      :root {
        --bg: #f4f6f5;
        --ink: #111827;
        --muted: #667085;
        --line: #d7dee4;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --deep: #102033;
        --deep-2: #172a3f;
        --teal: #0f766e;
        --teal-soft: #e4f3f1;
        --red: #b42318;
        --red-soft: #fff0ed;
        --green: #166534;
        --green-soft: #e8f6ed;
        --blue: #175cd3;
        --blue-soft: #eef4ff;
        --amber: #a15c07;
        --amber-soft: #fff7df;
        --purple: #6941c6;
        --purple-soft: #f4f0ff;
        --shadow: 0 18px 46px rgba(16, 32, 51, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, rgba(16, 32, 51, 0.06), rgba(244, 246, 245, 0) 360px),
          var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
      }

      a {
        color: inherit;
      }

      .app {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 14px;
      }

      .page-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .page-tab {
        display: inline-flex;
        align-items: center;
        height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: #344054;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      .page-tab.active {
        border-color: var(--deep);
        background: var(--deep);
        color: #fff;
      }

      .generated {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 14px;
        margin-bottom: 14px;
      }

      .hero-main,
      .now-panel,
      .panel,
      .decision-card,
      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .hero-main {
        display: grid;
        align-content: space-between;
        min-height: 238px;
        padding: 20px;
        background:
          linear-gradient(135deg, rgba(16, 32, 51, 0.96), rgba(23, 42, 63, 0.94)),
          var(--deep);
        color: #fff;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #9ee5db;
        font-size: 13px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: 48px;
        line-height: 1.05;
      }

      .summary {
        max-width: 900px;
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        line-height: 1.65;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 20px;
      }

      .hero-metric {
        min-height: 72px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .hero-metric b {
        display: block;
        font-size: 22px;
      }

      .hero-metric span {
        display: block;
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        line-height: 1.35;
      }

      .now-panel {
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .now-panel h2,
      .panel-title {
        margin: 0;
        font-size: 16px;
        font-weight: 900;
      }

      .signal-list {
        display: grid;
        gap: 8px;
      }

      .signal {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      .signal b {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .signal span {
        display: -webkit-box;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .decision-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .decision-card {
        display: grid;
        gap: 10px;
        min-height: 210px;
        padding: 14px;
        border-top: 4px solid var(--blue);
      }

      .decision-card.defensive {
        border-top-color: var(--red);
      }

      .decision-card.risk {
        border-top-color: var(--green);
      }

      .decision-card.neutral {
        border-top-color: var(--blue);
      }

      .decision-kicker {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .decision-card h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.35;
      }

      .inclination {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.5;
      }

      .decision-card details {
        border-top: 1px solid var(--line);
        padding-top: 8px;
      }

      .decision-card summary {
        cursor: pointer;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      .decision-card ul {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .how-use {
        margin: 8px 0 0;
        color: var(--ink);
        font-size: 12px;
        line-height: 1.55;
      }

      .related-news {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .related-news b {
        font-size: 12px;
      }

      .news-link {
        display: block;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.45;
        text-decoration: none;
      }

      .news-link span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 14px;
        align-items: start;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .control {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 0 10px;
        font-weight: 800;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        border-top: 1px solid var(--line);
        border-left: 1px solid var(--line);
      }

      .weekday,
      .day-cell {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .weekday {
        padding: 9px 10px;
        background: #eef2f4;
        color: #475467;
        font-size: 12px;
        font-weight: 900;
      }

      .day-cell {
        min-height: 174px;
        padding: 8px;
        background: #fff;
      }

      .day-cell.outside {
        background: #f8fafb;
        color: #98a2b3;
      }

      .day-num {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 900;
      }

      .day-count {
        color: var(--muted);
        font-size: 11px;
      }

      .cal-item {
        display: grid;
        gap: 4px;
        width: 100%;
        margin: 0 0 6px;
        padding: 7px;
        border: 1px solid var(--line);
        border-left: 4px solid var(--blue);
        border-radius: 8px;
        background: var(--panel-2);
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .cal-item.data {
        border-left-color: var(--red);
        background: var(--red-soft);
      }

      .cal-item.news {
        border-left-color: var(--purple);
        background: var(--purple-soft);
      }

      .cal-item.market {
        border-left-color: var(--blue);
        background: var(--blue-soft);
      }

      .cal-title {
        overflow: hidden;
        color: var(--ink);
        font-size: 12px;
        font-weight: 900;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cal-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .pill {
        display: inline-flex;
        min-height: 20px;
        align-items: center;
        padding: 2px 6px;
        border-radius: 999px;
        background: #fff;
        color: #344054;
        font-size: 11px;
        font-weight: 900;
      }

      .pill.red {
        color: var(--red);
      }

      .pill.green {
        color: var(--green);
      }

      .pill.blue {
        color: var(--blue);
      }

      .pill.purple {
        color: var(--purple);
      }

      .more {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .detail {
        display: none;
        padding: 14px;
        border-top: 1px solid var(--line);
        background: #fff;
      }

      .detail.show {
        display: block;
      }

      .detail h2 {
        margin: 0 0 8px;
        font-size: 19px;
      }

      .detail-sub {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .data-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 10px 0;
      }

      .data-box,
      .read-item,
      .asset-card {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      .data-box b,
      .read-item b,
      .asset-card b {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .data-box span,
      .read-item span,
      .asset-card span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .side {
        display: grid;
        gap: 14px;
      }

      .side-body,
      .asset-grid,
      .briefing-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .asset-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .empty {
        display: none;
        padding: 30px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 1180px) {
        .hero,
        .workbench {
          grid-template-columns: 1fr;
        }

        .decision-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 12px;
        }

        .topbar,
        .panel-head {
          align-items: stretch;
          flex-direction: column;
        }

        h1 {
          font-size: 34px;
        }

        .hero-metrics,
        .decision-grid,
        .asset-grid,
        .data-row {
          grid-template-columns: 1fr;
        }

        .calendar-grid {
          display: block;
          border: 0;
        }

        .weekday {
          display: none;
        }

        .day-cell {
          min-height: auto;
          margin-bottom: 8px;
          border: 1px solid var(--line);
          border-radius: 8px;
        }

        .day-cell.outside {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <nav class="topbar" aria-label="报告页面">
        <div class="page-tabs">
          <a class="page-tab" href="./index.html">今日热点</a>
          <a class="page-tab active" href="./macro.html">金融宏观</a>
        </div>
        <div class="generated" id="generatedAt">生成时间：-</div>
      </nav>

      <header class="hero">
        <section class="hero-main">
          <div>
            <p class="eyebrow">每日 8:20 自动刷新 · 数据 + 新闻同屏</p>
            <h1>金融宏观</h1>
            <p class="summary" id="summary">正在读取宏观数据...</p>
          </div>
          <div class="hero-metrics" aria-label="宏观概览">
            <div class="hero-metric">
              <b id="eventCount">0</b>
              <span>宏观数据事件</span>
            </div>
            <div class="hero-metric">
              <b id="newsCount">0</b>
              <span>实时新闻</span>
            </div>
            <div class="hero-metric">
              <b id="riskSignal">-</b>
              <span>风险体制</span>
            </div>
            <div class="hero-metric">
              <b id="cryptoMood">-</b>
              <span>币圈情绪</span>
            </div>
          </div>
        </section>

        <aside class="now-panel">
          <h2>今日先看什么</h2>
          <div class="signal-list" id="signalList"></div>
        </aside>
      </header>

      <section class="decision-grid" id="questionGrid" aria-label="四个宏观问题"></section>

      <section class="workbench">
        <div class="panel">
          <div class="panel-head">
            <p class="panel-title" id="calendarTitle">宏观月历</p>
            <div class="toolbar">
              <select class="control" id="typeFilter">
                <option value="">全部</option>
                <option value="data">只看数据</option>
                <option value="news">只看新闻</option>
              </select>
              <select class="control" id="impactFilter">
                <option value="">全部影响</option>
                <option value="rates">利率/美元</option>
                <option value="inflation">通胀/商品</option>
                <option value="risk">避险/风险</option>
                <option value="crypto">币圈</option>
              </select>
            </div>
          </div>
          <div class="calendar-grid" id="calendar"></div>
          <div class="empty" id="empty">当前筛选下没有日历项目。</div>
          <div class="detail" id="detail"></div>
        </div>

        <aside class="side">
          <section class="panel">
            <div class="panel-head">
              <p class="panel-title">历史每日要闻</p>
            </div>
            <div class="briefing-list" id="briefingList"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <p class="panel-title">资产温度</p>
            </div>
            <div class="asset-grid" id="assetGrid"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <p class="panel-title">数据源状态</p>
            </div>
            <div class="side-body" id="sourceGrid"></div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const state = {
        events: [],
        news: [],
        prices: [],
        ratios: [],
        rateMetrics: [],
        cryptoMetrics: [],
        questions: [],
        dailyBriefing: null,
        sources: [],
        selectedId: "",
      };

      const els = {
        summary: document.querySelector("#summary"),
        generatedAt: document.querySelector("#generatedAt"),
        eventCount: document.querySelector("#eventCount"),
        newsCount: document.querySelector("#newsCount"),
        riskSignal: document.querySelector("#riskSignal"),
        cryptoMood: document.querySelector("#cryptoMood"),
        signalList: document.querySelector("#signalList"),
        questionGrid: document.querySelector("#questionGrid"),
        calendarTitle: document.querySelector("#calendarTitle"),
        typeFilter: document.querySelector("#typeFilter"),
        impactFilter: document.querySelector("#impactFilter"),
        calendar: document.querySelector("#calendar"),
        empty: document.querySelector("#empty"),
        detail: document.querySelector("#detail"),
        briefingList: document.querySelector("#briefingList"),
        assetGrid: document.querySelector("#assetGrid"),
        sourceGrid: document.querySelector("#sourceGrid"),
      };

      function text(value) {
        return value == null || value === "" ? "-" : String(value);
      }

      function escapeHtml(value) {
        return text(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function parseDate(value) {
        const raw = text(value);
        const zh = raw.match(/(\d{4})年(\d{1,2})月份/);
        if (zh) return new Date(Number(zh[1]), Number(zh[2]) - 1, 1);
        const date = new Date(raw);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function parseNewsDate(value) {
        const date = new Date(text(value));
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function classifyData(event) {
        const title = `${event.title || ""} ${event.category || ""}`;
        if (/非农|失业|就业/.test(title)) return { impact: "rates", tone: "data", why: "就业决定美联储降息/加息叙事，也会影响美元、美债和风险资产。" };
        if (/CPI|PPI|通胀/.test(title)) return { impact: "inflation", tone: "data", why: "通胀决定实际利率和商品定价，通常直接影响黄金、原油、美元和估值。" };
        if (/BTC|ETH|恐慌|市占|加密/.test(title)) return { impact: "crypto", tone: "market", why: "币圈指标用于判断风险偏好、山寨活跃度和资金是否回到 BTC 防守。" };
        return { impact: "risk", tone: "market", why: "用于确认风险偏好和跨资产定价方向。" };
      }

      function classifyNews(news) {
        const buckets = news.buckets || [];
        if (buckets.includes("macro-tide")) return { impact: "rates", tone: "news", label: "宏观" };
        if (buckets.includes("risk-regime")) return { impact: "risk", tone: "news", label: "避险" };
        if (buckets.includes("crypto-rotation") || buckets.includes("sentiment-extreme")) return { impact: "crypto", tone: "news", label: "币圈" };
        return { impact: "risk", tone: "news", label: "新闻" };
      }

      function calendarItems() {
        const dataItems = state.events.map((event) => ({
          id: `data:${event.id}`,
          kind: "data",
          date: parseDate(event.date),
          title: event.title,
          source: event.country || event.source,
          label: event.surprise || "数据",
          raw: event,
          impact: classifyData(event).impact,
        }));
        const newsItems = state.news.map((news, index) => ({
          id: `news:${index}`,
          kind: "news",
          date: parseNewsDate(news.published),
          title: news.title,
          source: news.source,
          label: classifyNews(news).label,
          raw: news,
          impact: classifyNews(news).impact,
        }));
        return [...dataItems, ...newsItems].filter((item) => item.date);
      }

      function itemMatches(item) {
        if (els.typeFilter.value && item.kind !== els.typeFilter.value) return false;
        if (els.impactFilter.value && item.impact !== els.impactFilter.value) return false;
        return true;
      }

      function monthBase(items) {
        const dates = items.map((item) => item.date).filter(Boolean).sort((a, b) => b - a);
        return dates[0] || new Date();
      }

      function sameDay(a, b) {
        return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }

      function renderCalendar() {
        const items = calendarItems().filter(itemMatches);
        const base = monthBase(items.length ? items : calendarItems());
        const year = base.getFullYear();
        const month = base.getMonth();
        els.calendarTitle.textContent = `${year}年${String(month + 1).padStart(2, "0")}月宏观日历`;
        const first = new Date(year, month, 1);
        const start = new Date(first);
        start.setDate(1 - first.getDay());
        const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
        const cells = weekdays.map((day) => `<div class="weekday">周${day}</div>`);

        for (let index = 0; index < 42; index += 1) {
          const day = new Date(start);
          day.setDate(start.getDate() + index);
          const dayItems = items.filter((item) => sameDay(item.date, day));
          const outside = day.getMonth() !== month;
          cells.push(`
            <div class="day-cell ${outside ? "outside" : ""}">
              <div class="day-num">
                <span>${day.getDate()}</span>
                ${dayItems.length ? `<span class="day-count">${dayItems.length}项</span>` : ""}
              </div>
              ${dayItems.slice(0, 5).map(renderCalendarItem).join("")}
              ${dayItems.length > 5 ? `<div class="more">还有 ${dayItems.length - 5} 项</div>` : ""}
            </div>
          `);
        }
        els.calendar.innerHTML = cells.join("");
        els.empty.style.display = items.length ? "none" : "block";
      }

      function renderCalendarItem(item) {
        const isNews = item.kind === "news";
        const raw = item.raw;
        const badge = isNews ? "purple" : raw.surprise?.includes("上升") || raw.surprise?.includes("多增") ? "red" : raw.surprise?.includes("回落") || raw.surprise?.includes("少增") ? "green" : "blue";
        return `
          <button class="cal-item ${item.kind}" data-id="${escapeHtml(item.id)}" type="button">
            <span class="cal-title">${escapeHtml(item.title)}</span>
            <span class="cal-meta">
              <span class="pill">${escapeHtml(item.source)}</span>
              <span class="pill ${badge}">${escapeHtml(item.label)}</span>
            </span>
          </button>
        `;
      }

      function renderDetail(item) {
        if (!item) {
          els.detail.classList.remove("show");
          els.detail.innerHTML = "";
          return;
        }
        els.detail.classList.add("show");
        if (item.kind === "news") {
          const news = item.raw;
          els.detail.innerHTML = `
            <h2>${escapeHtml(news.title)}</h2>
            <p class="detail-sub">${escapeHtml(news.source)} · ${escapeHtml(news.published || "-")}</p>
            <div class="read-item">
              <b>为什么放进日历</b>
              <span>新闻按发布时间落到月历里，用来解释四个宏观倾向背后的消息面。它不是交易结论，而是帮助判断数字信号是否有叙事支撑。</span>
            </div>
            ${news.summary ? `<p class="detail-sub">${escapeHtml(news.summary)}</p>` : ""}
            ${news.url ? `<a class="news-link" href="${escapeHtml(news.url)}" target="_blank" rel="noopener">打开原文</a>` : ""}
          `;
          return;
        }
        const event = item.raw;
        const meta = classifyData(event);
        els.detail.innerHTML = `
          <h2>${escapeHtml(event.title)}</h2>
          <p class="detail-sub">${escapeHtml(meta.why)}</p>
          <div class="data-row">
            <div class="data-box"><b>实际</b><span>${escapeHtml(event.actual)}</span></div>
            <div class="data-box"><b>前值</b><span>${escapeHtml(event.previous)}</span></div>
            <div class="data-box"><b>预期</b><span>${escapeHtml(event.expected)}</span></div>
          </div>
          <div class="read-item">
            <b>怎么用</b>
            <span>${escapeHtml(readingFor(event))}</span>
          </div>
        `;
      }

      function readingFor(event) {
        const title = `${event.title || ""} ${event.surprise || ""}`;
        if (/非农|就业/.test(title)) return "就业强，降息预期容易后移；就业弱，市场更容易交易宽松和风险偏好修复。看它主要是为了判断美元、美债和成长资产方向。";
        if (/失业/.test(title)) return "失业率上升代表劳动力市场降温，可能支持宽松；失业率稳定则需要结合非农和工资数据判断。";
        if (/CPI|PPI|通胀/.test(title)) return "通胀高会压制降息预期并支撑名义利率；通胀回落通常利好黄金、成长股和风险资产。中国 CPI/PPI 更像需求和工业价格温度计。";
        return "这个指标用于确认宏观背景，不单独做判断，要和价格比值、币圈情绪、新闻叙事一起看。";
      }

      function renderQuestions() {
        const questions = state.questions.length ? state.questions : [];
        els.questionGrid.innerHTML = questions
          .map((question) => `
            <article class="decision-card ${escapeHtml(question.tone || "neutral")}">
              <div>
                <p class="decision-kicker">${escapeHtml(question.subtitle || "")}</p>
                <h2>${escapeHtml(question.title)}</h2>
              </div>
              <p class="inclination">${escapeHtml(question.inclination)}</p>
              <details>
                <summary>依据 / 新闻</summary>
                <ul>${(question.bullets || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                <p class="how-use">${escapeHtml(question.howToUse)}</p>
                ${renderRelatedNews(question.news || [])}
              </details>
            </article>
          `)
          .join("");
      }

      function renderRelatedNews(news) {
        if (!news.length) return `<div class="related-news"><b>相关新闻</b><span class="how-use">暂无匹配新闻。</span></div>`;
        return `
          <div class="related-news">
            <b>相关新闻</b>
            ${news
              .map((item) => `
                <a class="news-link" href="${escapeHtml(item.url || "#")}" target="_blank" rel="noopener">
                  <span>${escapeHtml(item.source)} ${item.published ? "· " + escapeHtml(item.published) : ""}</span>
                  ${escapeHtml(item.title)}
                </a>
              `)
              .join("")}
          </div>
        `;
      }

      function renderSignals() {
        const signals = state.questions.slice(0, 4);
        els.signalList.innerHTML = signals
          .map((question) => `
            <div class="signal">
              <b>${escapeHtml(question.title)}</b>
              <span>${escapeHtml(question.inclination)}</span>
            </div>
          `)
          .join("");
      }

      function renderSide() {
        const briefing = state.dailyBriefing || {};
        const briefingItems = Array.isArray(briefing.items) ? briefing.items : [];
        els.briefingList.innerHTML = briefingItems.length
          ? briefingItems
              .map((item) => `
                <div class="read-item">
                  <b>${escapeHtml(item.title)}</b>
                  <span>${escapeHtml(briefing.source || "新闻联播")} · ${escapeHtml(briefing.date || "-")}</span>
                </div>
              `)
              .join("")
          : `<div class="read-item"><b>暂未拉到新闻联播要闻</b><span>不影响四个宏观判断；实时新闻仍会进入日历。</span></div>`;

        const assets = [...state.prices, ...state.ratios, ...state.rateMetrics, ...state.cryptoMetrics];
        els.assetGrid.innerHTML = assets
          .map((asset) => `
            <div class="asset-card">
              <b>${escapeHtml(asset.name)}：${escapeHtml(asset.value)}</b>
              <span>${escapeHtml(asset.notes)}</span>
            </div>
          `)
          .join("");

        els.sourceGrid.innerHTML = state.sources
          .map((source) => `
            <div class="asset-card">
              <b>${escapeHtml(source.name)}</b>
              <span>${escapeHtml(source.status)} · ${escapeHtml(source.usage)}</span>
            </div>
          `)
          .join("");
      }

      function renderStats() {
        const fear = state.cryptoMetrics.find((item) => item.name.includes("恐慌"));
        const regime = state.questions.find((item) => item.id === "risk-regime");
        els.eventCount.textContent = state.events.length;
        els.newsCount.textContent = state.news.length;
        els.cryptoMood.textContent = fear ? fear.value : "-";
        els.riskSignal.textContent = regime ? (regime.tone === "defensive" ? "偏避险" : regime.tone === "risk" ? "偏冒险" : "分歧") : "-";
      }

      function render() {
        renderQuestions();
        renderSignals();
        renderCalendar();
        renderSide();
        renderStats();
        const selected = calendarItems().find((item) => item.id === state.selectedId) || calendarItems()[0];
        renderDetail(selected);
      }

      els.calendar.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-id]");
        if (!button) return;
        state.selectedId = button.dataset.id;
        renderDetail(calendarItems().find((item) => item.id === state.selectedId));
      });

      [els.typeFilter, els.impactFilter].forEach((el) => el.addEventListener("input", render));

      fetch("data/macro-latest.json", { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then((data) => {
          state.events = Array.isArray(data.events) ? data.events : [];
          state.news = Array.isArray(data.news) ? data.news : [];
          state.ratios = Array.isArray(data.ratios) ? data.ratios : [];
          state.rateMetrics = Array.isArray(data.rateMetrics) ? data.rateMetrics : [];
          state.prices = Array.isArray(data.prices) ? data.prices : [];
          state.cryptoMetrics = Array.isArray(data.cryptoMetrics) ? data.cryptoMetrics : [];
          state.questions = Array.isArray(data.questions) ? data.questions : [];
          state.dailyBriefing = data.dailyBriefing || null;
          state.sources = Array.isArray(data.sources) ? data.sources : [];
          els.summary.textContent = data.summary || "已读取金融宏观日历。";
          els.generatedAt.textContent = `生成时间：${data.generatedAt || "-"}`;
          render();
        })
        .catch((error) => {
          els.summary.textContent = `宏观数据读取失败：${error.message}`;
          render();
        });
    </script>
  </body>
</html>
