<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>金融宏观</title>
    <style>
      :root {
        --bg: #f4f6f5;
        --ink: #0f172a;
        --text-strong: #0b1220;
        --text-main: #1f2937;
        --text-support: #344054;
        --text-quiet: #536274;
        --muted: #475467;
        --line: #d7dee4;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --deep: #102033;
        --deep-2: #172a3f;
        --teal: #0f766e;
        --teal-soft: #e4f3f1;
        --red: #b42318;
        --red-soft: #fff0ed;
        --green: #166534;
        --green-soft: #e8f6ed;
        --blue: #175cd3;
        --blue-soft: #eef4ff;
        --amber: #a15c07;
        --amber-soft: #fff7df;
        --purple: #6941c6;
        --purple-soft: #f4f0ff;
        --shadow: 0 18px 46px rgba(16, 32, 51, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, rgba(16, 32, 51, 0.06), rgba(244, 246, 245, 0) 360px),
          var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
      }

      a {
        color: inherit;
      }

      .app {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 18px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 14px;
      }

      .page-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .page-tab {
        display: inline-flex;
        align-items: center;
        height: 38px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: #344054;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      .page-tab.active {
        border-color: var(--deep);
        background: var(--deep);
        color: #fff;
      }

      .generated {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 14px;
        margin-bottom: 14px;
      }

      .hero-main,
      .now-panel,
      .panel,
      .decision-card,
      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .hero-main {
        display: grid;
        align-content: space-between;
        min-height: 238px;
        padding: 20px;
        background:
          linear-gradient(135deg, rgba(16, 32, 51, 0.96), rgba(23, 42, 63, 0.94)),
          var(--deep);
        color: #fff;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #9ee5db;
        font-size: 13px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: 48px;
        line-height: 1.05;
      }

      .summary {
        max-width: 900px;
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        line-height: 1.65;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 20px;
      }

      .hero-metric {
        min-height: 72px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .hero-metric b {
        display: block;
        font-size: 22px;
      }

      .hero-metric span {
        display: block;
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        line-height: 1.35;
      }

      .now-panel {
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      .now-panel h2,
      .panel-title {
        margin: 0;
        color: var(--text-strong);
        font-size: 16px;
        font-weight: 900;
      }

      .signal-list {
        display: grid;
        gap: 8px;
      }

      .signal {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      .signal b {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .signal span {
        display: -webkit-box;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .decision-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .decision-card {
        display: grid;
        gap: 10px;
        min-height: 210px;
        padding: 14px;
        border-top: 4px solid var(--blue);
      }

      .decision-card.defensive {
        border-top-color: var(--red);
      }

      .decision-card.risk {
        border-top-color: var(--green);
      }

      .decision-card.neutral {
        border-top-color: var(--blue);
      }

      .decision-kicker {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .decision-card h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.35;
      }

      .inclination {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.5;
      }

      .decision-card details {
        border-top: 1px solid var(--line);
        padding-top: 8px;
      }

      .decision-card summary {
        cursor: pointer;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      .decision-card ul {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }

      .how-use {
        margin: 8px 0 0;
        color: var(--ink);
        font-size: 12px;
        line-height: 1.55;
      }

      .related-news {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .related-news b {
        font-size: 12px;
      }

      .news-link {
        display: block;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.45;
        text-decoration: none;
      }

      .news-link span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .news-button {
        width: 100%;
        cursor: pointer;
        text-align: left;
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 14px;
        align-items: start;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .control {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 0 10px;
        font-weight: 800;
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        border-top: 1px solid var(--line);
        border-left: 1px solid var(--line);
      }

      .weekday,
      .day-cell {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .weekday {
        padding: 9px 10px;
        background: #eef2f4;
        color: #475467;
        font-size: 12px;
        font-weight: 900;
      }

      .day-cell {
        min-height: 174px;
        padding: 8px;
        background: #fff;
      }

      .day-cell.outside {
        background: #f8fafb;
        color: #667085;
      }

      .day-num {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 900;
      }

      .day-count {
        color: var(--text-quiet);
        font-size: 11px;
      }

      .cal-item {
        display: grid;
        gap: 4px;
        width: 100%;
        margin: 0 0 6px;
        padding: 7px;
        border: 1px solid var(--line);
        border-left: 4px solid var(--blue);
        border-radius: 8px;
        background: var(--panel-2);
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .cal-item.data {
        border-left-color: var(--red);
        background: var(--red-soft);
      }

      .cal-item.news {
        border-left-color: var(--purple);
        background: var(--purple-soft);
      }

      .cal-item.market {
        border-left-color: var(--blue);
        background: var(--blue-soft);
      }

      .cal-title {
        overflow: hidden;
        color: var(--ink);
        font-size: 12px;
        font-weight: 900;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cal-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .pill {
        display: inline-flex;
        min-height: 20px;
        align-items: center;
        padding: 2px 6px;
        border-radius: 999px;
        background: #fff;
        color: #344054;
        font-size: 11px;
        font-weight: 900;
      }

      .pill.red {
        color: var(--red);
      }

      .pill.green {
        color: var(--green);
      }

      .pill.blue {
        color: var(--blue);
      }

      .pill.purple {
        color: var(--purple);
      }

      .more {
        color: var(--text-quiet);
        font-size: 11px;
        font-weight: 800;
      }

      .detail {
        display: none;
        padding: 14px;
        border-top: 1px solid var(--line);
        background: #fff;
      }

      .detail.show {
        display: block;
      }

      .detail h2 {
        margin: 0 0 8px;
        color: var(--text-strong);
        font-size: 19px;
      }

      .detail-sub {
        margin: 0 0 10px;
        color: var(--text-support);
        font-size: 13px;
        line-height: 1.55;
      }

      .data-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 10px 0;
      }

      .data-box,
      .read-item,
      .asset-card {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
      }

      .data-box b,
      .read-item b,
      .asset-card b {
        display: block;
        margin-bottom: 4px;
        color: var(--text-strong);
        font-size: 13px;
      }

      .data-box span,
      .read-item span {
        color: var(--text-support);
        font-size: 12px;
        line-height: 1.5;
      }

      .asset-card span {
        color: var(--text-quiet);
        font-size: 12px;
        line-height: 1.5;
      }

      .side {
        display: grid;
        gap: 14px;
      }

      .side-body,
      .asset-grid,
      .briefing-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .asset-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .explain-list {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .explain-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .explain-card summary {
        cursor: pointer;
        padding: 10px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 900;
      }

      .explain-card p {
        margin: 0;
        padding: 0 10px 10px;
        color: var(--text-support);
        font-size: 12px;
        line-height: 1.55;
      }

      .indicator-explain {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .indicator-explain summary {
        cursor: pointer;
        padding: 10px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      .indicator-explain .explain-body {
        display: grid;
        gap: 8px;
        padding: 0 10px 10px;
      }

      .empty {
        display: none;
        padding: 30px;
        color: var(--text-quiet);
        text-align: center;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(16, 32, 51, 0.5);
      }

      .modal-backdrop.show {
        display: flex;
      }

      .news-modal {
        width: min(680px, 100%);
        max-height: min(720px, 88vh);
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 26px 80px rgba(16, 32, 51, 0.26);
      }

      .modal-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .modal-head h2 {
        margin: 0;
        font-size: 20px;
        line-height: 1.35;
      }

      .modal-close {
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }

      .modal-body {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .shell {
        width: min(1440px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 42px;
      }

      .cockpit-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px;
        gap: 18px;
        align-items: stretch;
        padding: 22px;
        border-radius: 10px;
        background: #101828;
        color: #fff;
      }

      .cockpit-hero h1 {
        margin: 6px 0 8px;
        font-size: clamp(26px, 4vw, 44px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .hero-reason {
        max-width: 920px;
        margin: 0;
        color: #f2f4f7;
        font-size: 15px;
        line-height: 1.65;
      }

      .hero-meta {
        display: grid;
        align-content: space-between;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: #e4e7ec;
        font-size: 13px;
        font-weight: 800;
      }

      .asset-actions,
      .evidence-grid,
      .watchlist,
      .asset-temperature,
      .risk-schedule,
      .evidence-list {
        display: grid;
        gap: 10px;
      }

      .asset-actions {
        grid-template-columns: repeat(4, minmax(0, max-content));
        margin-top: 14px;
      }

      .action-chip {
        padding: 7px 10px;
        border-radius: 999px;
        background: #f2f4f7;
        color: #344054;
        font-size: 12px;
        font-weight: 900;
      }

      .cockpit-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 14px;
        margin-top: 14px;
        align-items: start;
      }

      .asset-spotlight-panel {
        margin-top: 14px;
      }

      .asset-spotlight {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
      }

      .asset-tile {
        min-height: 108px;
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text-main);
        text-align: left;
        cursor: pointer;
      }

      .asset-tile:hover {
        border-color: var(--deep);
        box-shadow: 0 10px 24px rgba(16, 32, 51, 0.08);
      }

      .asset-tile b {
        display: block;
        color: var(--text-strong);
        font-size: 13px;
        line-height: 1.35;
      }

      .asset-tile strong {
        display: block;
        margin: 8px 0 6px;
        color: var(--text-strong);
        font-size: 21px;
        line-height: 1;
      }

      .asset-tile span {
        display: block;
        color: var(--text-quiet);
        font-size: 12px;
        line-height: 1.45;
      }

      .accordion-list {
        display: grid;
        gap: 8px;
      }

      .accordion-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .accordion-trigger {
        display: grid;
        grid-template-columns: minmax(0, 1fr) max-content;
        gap: 10px;
        width: 100%;
        padding: 12px;
        border: 0;
        background: transparent;
        color: var(--text-main);
        text-align: left;
        cursor: pointer;
      }

      .accordion-trigger b {
        color: var(--text-strong);
        font-size: 14px;
        line-height: 1.45;
      }

      .accordion-trigger span {
        align-self: start;
      }

      .accordion-body {
        display: none;
        padding: 0 12px 12px;
      }

      .accordion-card.open .accordion-body {
        display: block;
      }

      .reason-list {
        margin: 0;
        padding-left: 18px;
        color: var(--text-support);
        font-size: 13px;
        line-height: 1.65;
      }

      .reason-list li + li {
        margin-top: 4px;
      }

      .main-column,
      .side-column {
        display: grid;
        gap: 14px;
      }

      .evidence-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .evidence-card,
      .watch-card,
      .schedule-item,
      .temperature-card,
      .evidence-note {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 12px;
      }

      .evidence-card b,
      .watch-card b,
      .temperature-card b {
        display: block;
        margin-bottom: 6px;
        color: var(--text-strong);
        font-size: 13px;
      }

      .evidence-card p,
      .watch-card p,
      .schedule-item p,
      .evidence-note span {
        margin: 0;
        color: var(--text-support);
        font-size: 13px;
        line-height: 1.55;
      }

      .temperature-card span {
        margin: 0;
        color: var(--text-quiet);
        font-size: 12px;
        line-height: 1.55;
      }

      .split-evidence {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }

      .split-evidence > div:first-child {
        border-right: 1px solid var(--line);
      }

      .panel-head.compact {
        padding: 13px 14px;
      }

      .risk-schedule {
        padding: 12px;
      }

      .schedule-item {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr) 110px;
        gap: 10px;
        align-items: center;
      }

      .schedule-item b {
        color: var(--text-strong);
      }

      .side-column {
        position: sticky;
        top: 12px;
        max-height: calc(100vh - 24px);
        overflow: auto;
      }

      .collapsed-panel {
        padding: 0;
      }

      .collapsed-panel summary {
        cursor: pointer;
        padding: 13px 14px;
        font-weight: 900;
      }

      .calendar-drawer {
        border-top: 1px solid var(--line);
      }

      .calendar-drawer summary {
        cursor: pointer;
        padding: 12px 14px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      .asset-drawer-backdrop {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        background: rgba(16, 32, 51, 0.42);
      }

      .asset-drawer-backdrop.show {
        display: block;
      }

      .asset-drawer {
        width: min(760px, calc(100vw - 28px));
        height: 100%;
        overflow: auto;
        background: #f8fafc;
        box-shadow: 24px 0 60px rgba(16, 32, 51, 0.22);
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }

      .asset-drawer-backdrop.show .asset-drawer {
        transform: translateX(0);
      }

      .drawer-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        padding: 18px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }

      .drawer-head h2 {
        margin: 0;
        color: var(--text-strong);
        font-size: 24px;
      }

      .drawer-price {
        margin: 8px 0 0;
        color: var(--text-strong);
        font-size: 32px;
        font-weight: 900;
      }

      .drawer-meta {
        margin: 6px 0 0;
        color: var(--text-quiet);
        font-size: 13px;
      }

      .drawer-close {
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text-strong);
        font-size: 20px;
      }

      .drawer-body {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .range-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .range-tabs button {
        height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text-main);
        font-size: 13px;
        font-weight: 900;
      }

      .range-tabs button.active {
        border-color: var(--deep);
        background: var(--deep);
        color: #fff;
      }

      function numberFrom(value) {
        const match = String(value || "").replaceAll(",", "").match(/-?\d+(\.\d+)?/);
        return match ? Number(match[0]) : null;
      }

      function metricByName(items, needle) {
        return (items || []).find((item) => String(item?.name || "").includes(needle));
      }

      function eventById(id) {
        return (state.events || []).find((event) => event.id === id);
      }

      function buildHeadlineDecision() {
        const realRate = metricByName(state.rateMetrics, "实际利率");
        const dxy = metricByName(state.prices, "美元指数");
        const vix = metricByName(state.prices, "VIX");
        const fng = metricByName(state.cryptoMetrics, "恐慌贪婪");
        const goldOil = metricByName(state.ratios, "金油比");
        const ethBtc = metricByName(state.ratios, "ETH/BTC");
        const realRateValue = numberFrom(realRate?.value);
        const dxyValue = numberFrom(dxy?.value);
        const vixValue = numberFrom(vix?.value);
        const fngValue = numberFrom(fng?.value);

        const defensiveVotes = [];
        const riskVotes = [];

        if (realRateValue != null && realRateValue >= 2) defensiveVotes.push("实际利率仍高，黄金和风险资产都承压");
        if (dxyValue != null && dxyValue >= 98) defensiveVotes.push("美元指数不弱，全球流动性偏紧");
        if ((goldOil?.changePct || 0) > 5) defensiveVotes.push("金油比上行，增长担忧或避险需求抬头");
        if ((ethBtc?.changePct || 0) < 0) defensiveVotes.push("ETH/BTC 走弱，币圈内部风险偏好不足");

        if (vixValue != null && vixValue < 18) riskVotes.push("VIX 不高，市场还不是系统性恐慌");
        if (fngValue != null && fngValue > 25 && fngValue < 75) riskVotes.push("币圈情绪未到极端，不适合硬做反转");

        let headline = "偏观望，等待关键数据确认";
        if (defensiveVotes.length >= 3 && riskVotes.length) headline = "偏防守，但不是极端避险";
        else if (defensiveVotes.length >= 3) headline = "偏防守，优先控制风险";
        else if (riskVotes.length >= 2 && defensiveVotes.length <= 1) headline = "偏中性，风险偏好尚未恶化";

        return {
          headline,
          reason: [...defensiveVotes.slice(0, 2), ...riskVotes.slice(0, 1)].join("；") || "核心指标分歧较大，今天先看关键数据和新闻是否给出方向。",
          actions: [
            { label: "黄金", value: defensiveVotes.length >= 2 ? "观察偏多" : "等实际利率" },
            { label: "BTC", value: (ethBtc?.changePct || 0) < 0 ? "不追" : "观察资金流" },
            { label: "美股", value: vixValue != null && vixValue < 18 ? "等数据" : "控回撤" },
            { label: "现金", value: "保留机动" },
          ],
          support: defensiveVotes,
          counter: riskVotes,
        };
      }

      function buildEvidenceCards(decision) {
        const realRate = metricByName(state.rateMetrics, "实际利率");
        const dxy = metricByName(state.prices, "美元指数");
        const goldOil = metricByName(state.ratios, "金油比");
        const ethBtc = metricByName(state.ratios, "ETH/BTC");
        const fng = metricByName(state.cryptoMetrics, "恐慌贪婪");
        const vix = metricByName(state.prices, "VIX");
        const realRateValue = numberFrom(realRate?.value);
        const dxyValue = numberFrom(dxy?.value);

        return [
          {
            title: "潮水",
            verdict: (realRateValue != null && realRateValue >= 2) || (dxyValue != null && dxyValue >= 98) ? "偏紧" : "中性",
            note: `${realRate?.value || "实际利率缺失"}；${dxy?.value ? `DXY ${dxy.value}` : "DXY 缺失"}`,
          },
          {
            title: "避险",
            verdict: (goldOil?.changePct || 0) > 5 ? "升温" : "不极端",
            note: goldOil ? `金油比 ${goldOil.value}，近月 ${formatPct(goldOil.changePct)}` : "等待金油比",
          },
          {
            title: "币圈",
            verdict: (ethBtc?.changePct || 0) < 0 ? "偏防守" : "观察扩散",
            note: ethBtc ? `ETH/BTC ${ethBtc.value}，近月 ${formatPct(ethBtc.changePct)}` : "等待 ETH/BTC",
          },
          {
            title: "情绪",
            verdict: "未极端",
            note: `${vix?.value ? `VIX ${vix.value}` : "VIX 缺失"}；${fng?.value ? `恐慌贪婪 ${fng.value}` : "情绪缺失"}`,
          },
        ];
      }

      function buildWatchlist(items) {
        const scored = (items || [])
          .map((item) => {
            const title = item?.title || "";
            let score = 1;
            let why = "只在能解释资产变化时关注";
            if (/PCE|CPI|非农|FOMC|美联储|初请|失业率/.test(title)) {
              score = 3;
              why = "可能改变降息预期和美元/美债方向";
            } else if (/OPEC|原油|中东|伊朗|以色列|俄乌|关税|特朗普/.test(title)) {
              score = 2;
              why = "可能影响通胀、原油和黄金避险需求";
            } else if (/BTC|比特币|ETF|稳定币|ETH/.test(title)) {
              score = 2;
              why = "可能影响币圈资金流和风险偏好";
            }
            return { ...item, score, why };
          })
          .sort((a, b) => b.score - a.score || b.date - a.date);

        return scored.slice(0, 5);
      }

      function sentenceParts(value) {
        return text(value)
          .replace(/\s+/g, " ")
          .split(/(?<=[。！？；;.!?])\s*/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function compactConclusion(value, fallback = "这条信息需要继续观察") {
        const source = sentenceParts(value).join(" ");
        if (!source || source === "-") return fallback;
        return source.length > 76 ? `${source.slice(0, 76)}...` : source;
      }

      function articleTypeFor(news) {
        const body = `${news?.summaryZh || ""} ${news?.summary || ""} ${news?.titleZh || ""} ${news?.title || ""}`;
        return /认为|指出|分析|预计|警告|称|表示|应该|可能|或将|能否|为何|怎么看|如何|opinion|analysis|why|could|should/i.test(body)
          ? "opinion"
          : "report";
      }

      function cleanNewsBody(news) {
        const title = text(news?.titleZh || news?.title).replace(/[?？]+/g, "。");
        const article = text(news?.articleContentZh || news?.articleContent).replace(/[?？]+/g, "。");
        const summary = text(news?.summaryZh || news?.summary).replace(/[?？]+/g, "。");
        const body = article && article !== "-" && article.length > summary.length ? article : (summary && summary !== "-" && summary !== title ? summary : title);
        return sentenceParts(body)
          .filter((item) => !/^本文|^文章|^本篇|探讨了|分析了/.test(item))
          .map((item) => stripNewsSource(item.replace(/^摘要[:：]\s*/, "")))
          .filter(Boolean);
      }

      function stripNewsSource(value) {
        return text(value)
          .replace(/\s*[-—]\s*(搜狐网|新浪财经|财联社|华尔街见闻|金融界|环球市场播报|TradingKey|Bitget|Binance|hstrong\.com|Google新闻|MarketWatch|CoinDesk|路透|Reuters)\s*$/gi, "")
          .replace(/^(搜狐网|新浪财经|财联社|华尔街见闻|金融界|TradingKey|Bitget|Binance)[:：]\s*/gi, "")
          .replace(/^[高低中]\s*[|｜]\s*/, "")
          .replace(/^(前瞻|快讯|独家|重磅)[:：]\s*/, "")
          .replace(/[“”"]/g, "")
          .trim();
      }

      function newsTimeText(news) {
        const date = parseNewsDate(news?.published);
        if (!date) return "时间未明";
        return date.toLocaleString("zh-CN", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        });
      }

      function expectedValueFrom(body) {
        const match = body.match(/(?:预期|预计|预测|共识|市场预估|expected)[为是约：:\s]*(?:达到|录得|升至|降至)?\s*([+-]?\d+(?:\.\d+)?\s*(?:%|万人|千人|万人次|万|亿|点|基点|bp|美元|桶|盎司)?)/i);
        return match ? match[1].replace(/\s+/g, "") : "";
      }

      function firstUsefulSentence(parts) {
        const banned = /^(市场)?(关注|等待|聚焦)|文章分析了|本文探讨了|市场如何反应|怎么看|如何反应/;
        return parts.find((part) => part.length >= 8 && !banned.test(part)) || parts[0] || "";
      }

      function eventNameFromNews(news, body) {
        const title = stripNewsSource(news?.titleZh || news?.title || "");
        const beforeColon = title.split(/[：:]/)[0];
        return stripNewsSource(beforeColon || body)
          .replace(/^(前瞻|快讯|重磅|独家)\s*/, "")
          .replace(/市场(关注|等待|聚焦).*/, "")
          .replace(/将公布|即将公布|公布前.*/, "")
          .replace(/市场如何反应.*/, "")
          .trim()
          .slice(0, 42) || "关键财经事件";
      }

      function isForwardNews(body) {
        return /前瞻|将公布|即将公布|待公布|将召开|即将召开|决议前|会议前|公布前|倒计时|预期|预计|预测|市场预估/i.test(body);
      }

      function factForNews(news, parts) {
        const body = `${parts.join(" ")} ${news?.titleZh || ""} ${news?.title || ""}`;
        const time = newsTimeText(news);
        if (isForwardNews(body)) {
          const expected = expectedValueFrom(body);
          const eventName = eventNameFromNews(news, body);
          return `${eventName}将公布或推进，接口摘要${expected ? `给出的预期值为${expected}` : "未给出明确预期值"}，当前更新时间为${time}。`;
        }
        let fact = stripNewsSource(firstUsefulSentence(parts))
          .replace(/^市场(关注|等待|聚焦)[:：，,]?\s*/, "")
          .replace(/市场如何反应[？?]?/g, "")
          .replace(/^[：:，,]\s*/, "")
          .trim();
        if (!fact) fact = "出现一条需要纳入宏观判断的财经消息";
        fact = fact.length > 88 ? `${fact.slice(0, 88)}...` : fact;
        return /(\d{1,2}月\d{1,2}日|\d{4}-\d{2}-\d{2}|\d{1,2}:\d{2}|今日|周[一二三四五六日天])/.test(fact)
          ? (fact.endsWith("。") ? fact : `${fact}。`)
          : `${fact}（更新时间：${time}）。`;
      }

      function impactForNews(news, parts) {
        const body = `${parts.join(" ")} ${news?.titleZh || ""} ${news?.title || ""}`.toLowerCase();
        const forward = isForwardNews(body);
        const hot = /超预期|高于预期|强于预期|升温|上升|上涨|走高|hawkish|hot|higher|加息|推迟降息|通胀粘性|强劲/.test(body);
        const cool = /不及预期|低于预期|弱于预期|降温|下滑|回落|走低|dovish|cool|lower|降息|宽松|疲软|放缓/.test(body);
        const easing = /停火|和谈|缓和|解除|增产|恢复供应|降关税|ceasefire|deal/.test(body);

        if (/财报|营收|利润|ipo|ai|anthropic|openai|英伟达|nvidia|苹果|微软|meta|资本开支|数据中心|芯片|半导体/.test(body)) {
          return "主要影响美股科技和 AI 产业链，因为业绩、IPO 或资本开支会改变纳指盈利预期和风险偏好。";
        }
        if (/cpi|pce|ppi|通胀|物价|非农|就业|失业|初请|fomc|美联储|鲍威尔|fed|利率|降息|加息|国债|treasury|yield|dxy|美元指数|美元走强|美元走弱|美元反弹|美元回落|收益率/.test(body)) {
          if (forward) return "若数据高于预期，利好美元和美债收益率、利空黄金和美股估值；若低于预期则利好黄金和美债价格，因为降息预期会升温。";
          if (hot) return "利好美元和美债收益率、利空黄金和风险资产，因为更强数据会削弱降息预期并抬高实际利率。";
          if (cool) return "利好黄金和美债价格、利空美元，因为经济或通胀降温会强化降息预期。";
          return "短线主要影响美元、美债和黄金，因为它会改变市场对央行利率路径的定价。";
        }
        if (/opec|原油|oil|brent|wti|红海|伊朗|以色列|俄乌|乌克兰|俄罗斯|中东|战争|冲突|袭击|地缘/.test(body)) {
          if (easing) return "利空原油和黄金避险溢价、利好风险资产，因为供应和地缘风险溢价会下降。";
          return "利好原油和黄金、利空高风险资产，因为地缘冲突或供给扰动会推升能源价格和避险需求。";
        }
        if (/特朗普|trump|关税|tariff|贸易|制裁|出口管制|对华|白宫|国会|财政|赤字/.test(body)) {
          return "利空全球风险资产和人民币资产、利好美元短线避险，因为关税或政策不确定性会抬升通胀和贸易摩擦溢价。";
        }
        if (/gdp|pmi|零售|消费者信心|ism|房地产|社融|m2|lpr|经济增长|制造业/.test(body)) {
          if (forward) return "若增长数据好于预期，利好股票和工业品、利空债券价格；若差于预期则利好债券和黄金，因为避险与宽松预期会上升。";
          if (hot) return "利好股票和工业品、利空债券价格，因为增长韧性会提高盈利预期并压低降息交易。";
          if (cool) return "利好债券和黄金、利空周期股，因为增长走弱会提升避险和政策宽松预期。";
          return "主要影响股债跷跷板，因为增长强弱会改变盈利预期和利率预期。";
        }
        if (/比特币|bitcoin|btc|eth|以太坊|crypto|币圈|加密|稳定币|链上|((sec|etf).*(比特币|bitcoin|btc|eth|以太坊|crypto|币圈|加密))/.test(body)) {
          if (/流入|增持|批准|买入|新高|上涨|走强|inflow|approve/.test(body)) return "利好 BTC、ETH 和币圈风险偏好，因为资金流入或监管利好会提高加密资产需求。";
          if (/流出|抛售|起诉|监管|下跌|走弱|outflow|lawsuit/.test(body)) return "利空 BTC、ETH 和山寨币，因为资金流出或监管压力会压低风险偏好。";
          return "主要影响 BTC、ETH 和山寨币，因为币圈资金流会放大风险偏好的变化。";
        }
        return "短线影响偏中性，先看美元、美债收益率、黄金和股指是否同向确认，因为接口摘要没有给出足够强的传导线索。";
      }

      function summarizeNewsConclusion(news) {
        const parts = cleanNewsBody(news);
        const fact = factForNews(news, parts);
        const impact = impactForNews(news, parts);
        return {
          type: articleTypeFor(news),
          fact,
          impact,
          conclusion: `事实:${fact}`,
          reasons: [`影响:${impact}`],
        };
      }

      function summarizeItem(item) {
        if (!item) return { conclusion: "-", reasons: [] };
        if (item.kind === "news") {
          const news = item.raw || {};
          const summary = summarizeNewsConclusion(news);
          return {
            conclusion: summary.conclusion,
            reasons: summary.reasons,
            fact: summary.fact,
            impact: summary.impact,
          };
        }

        const event = item.raw || {};
        const meta = classifyData(event);
        const actual = event.actual && event.actual !== "-" ? `实际 ${event.actual}` : "";
        const previous = event.previous && event.previous !== "-" ? `前值 ${event.previous}` : "";
        const surprise = event.surprise && event.surprise !== "-" ? event.surprise : "";
        const conclusion = compactConclusion(
          `${event.title || item.title}${actual ? `：${actual}` : ""}${surprise ? `，${surprise}` : ""}`,
          event.title || item.title
        );
        return {
          conclusion,
          reasons: [
            [actual, previous].filter(Boolean).join("；") || "官方源暂未给出可比数值。",
            event.expected && event.expected !== "-" ? `预期：${event.expected}` : "免费官方源通常没有市场预期，只能和前值、趋势交叉判断。",
            meta.why,
            event.notes ? `数据来源：${event.source || item.source}，${event.notes}` : `数据来源：${event.source || item.source}`,
          ].filter(Boolean),
        };
      }

      function dedupeNews(items) {
        const seen = new Set();
        return (items || []).filter((news) => {
          const title = stripNewsSource(news?.titleZh || news?.title || "");
          const summary = stripNewsSource(news?.summaryZh || news?.summary || "");
          const key = (news?.url || `${title} ${summary}`)
            .toLowerCase()
            .replace(/[^\u4e00-\u9fa5a-z0-9]/gi, "")
            .slice(0, 96);
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function renderAccordionItems(items, options = {}) {
        const scope = options.scope || "global";
        const ids = items.map((item) => `${scope}:${item.id}`);
        if (!state.selectedAccordionId && ids.length) state.selectedAccordionId = ids[0];
        return items
          .map((item) => {
            const accordionId = `${scope}:${item.id}`;
            const summary = summarizeItem(item);
            const open = accordionId === state.selectedAccordionId;
            return `
              <article class="accordion-card ${open ? "open" : ""}">
                <button class="accordion-trigger" data-accordion-id="${escapeHtml(accordionId)}" type="button">
                  <b>${escapeHtml(summary.conclusion)}</b>
                  <span class="pill">${escapeHtml(options.showDate ? item.date.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit" }) : item.label)}</span>
                </button>
                <div class="accordion-body">
                  <ol class="reason-list">
                    ${summary.reasons.map((reason) => `<li>${escapeHtml(reason)}</li>`).join("")}
                  </ol>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function sevenDayItems() {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 2);
        const end = new Date(now);
        end.setDate(now.getDate() + 7);
        return calendarItems()
          .filter(itemMatches)
          .filter((item) => item.date >= start && item.date <= end)
          .sort((a, b) => b.date - a.date);
      }

      function formatPct(value) {
        if (typeof value !== "number" || Number.isNaN(value)) return "-";
        return `${value >= 0 ? "+" : ""}${value.toFixed(1)}%`;
      }

      function text(value) {
        return value == null || value === "" ? "-" : String(value);
      }

      function escapeHtml(value) {
        return text(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function parseDate(value) {
        const raw = text(value);
        const zh = raw.match(/(\d{4})年(\d{1,2})月份/);
        if (zh) return new Date(Number(zh[1]), Number(zh[2]) - 1, 1);
        const date = new Date(raw);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function parseNewsDate(value) {
        const date = new Date(text(value));
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function classifyData(event) {
        const title = `${event.title || ""} ${event.category || ""}`;
        if (/非农|失业|就业/.test(title)) return { impact: "rates", tone: "data", why: "就业决定美联储降息/加息叙事，也会影响美元、美债和风险资产。" };
        if (/CPI|PPI|通胀/.test(title)) return { impact: "inflation", tone: "data", why: "通胀决定实际利率和商品定价，通常直接影响黄金、原油、美元和估值。" };
        if (/BTC|ETH|恐慌|市占|加密/.test(title)) return { impact: "crypto", tone: "market", why: "币圈指标用于判断风险偏好、山寨活跃度和资金是否回到 BTC 防守。" };
        return { impact: "risk", tone: "market", why: "用于确认风险偏好和跨资产定价方向。" };
      }

      function classifyNews(news) {
        const buckets = news.buckets || [];
        if (buckets.includes("macro-tide")) return { impact: "rates", tone: "news", label: "宏观" };
        if (buckets.includes("risk-regime")) return { impact: "risk", tone: "news", label: "避险" };
        if (buckets.includes("crypto-rotation") || buckets.includes("sentiment-extreme")) return { impact: "crypto", tone: "news", label: "币圈" };
        return { impact: "risk", tone: "news", label: "新闻" };
      }

      function calendarItems() {
        const dataItems = state.events.map((event) => ({
          id: `data:${event.id}`,
          kind: "data",
          date: parseDate(event.date),
          title: event.title,
          source: event.country || event.source,
          label: event.surprise || "数据",
          raw: event,
          impact: classifyData(event).impact,
        }));
        const newsItems = state.news.map((news, index) => ({
          id: `news:${index}`,
          kind: "news",
          date: parseNewsDate(news.published),
          title: news.titleZh || news.title,
          source: news.source,
          label: classifyNews(news).label,
          raw: news,
          impact: classifyNews(news).impact,
        }));
        return [...dataItems, ...newsItems].filter((item) => item.date);
      }

      function itemMatches(item) {
        if (els.typeFilter.value && item.kind !== els.typeFilter.value) return false;
        if (els.impactFilter.value && item.impact !== els.impactFilter.value) return false;
        return true;
      }

      function monthBase(items) {
        const dates = items.map((item) => item.date).filter(Boolean).sort((a, b) => b - a);
        return dates[0] || new Date();
      }

      function sameDay(a, b) {
        return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }

      function renderCalendar() {
        const items = calendarItems().filter(itemMatches);
        const base = monthBase(items.length ? items : calendarItems());
        const year = base.getFullYear();
        const month = base.getMonth();
        els.calendarTitle.textContent = `${year}年${String(month + 1).padStart(2, "0")}月宏观日历`;
        const first = new Date(year, month, 1);
        const start = new Date(first);
        start.setDate(1 - first.getDay());
        const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
        const cells = weekdays.map((day) => `<div class="weekday">周${day}</div>`);

        for (let index = 0; index < 42; index += 1) {
          const day = new Date(start);
          day.setDate(start.getDate() + index);
          const dayItems = items.filter((item) => sameDay(item.date, day)).sort((a, b) => b.date - a.date);
          const outside = day.getMonth() !== month;
          cells.push(`
            <div class="day-cell ${outside ? "outside" : ""}">
              <div class="day-num">
                <span>${day.getDate()}</span>
                ${dayItems.length ? `<span class="day-count">${dayItems.length}项</span>` : ""}
              </div>
              ${dayItems.slice(0, 5).map(renderCalendarItem).join("")}
              ${dayItems.length > 5 ? `<div class="more">还有 ${dayItems.length - 5} 项</div>` : ""}
            </div>
          `);
        }
        els.calendar.innerHTML = cells.join("");
        els.empty.style.display = items.length ? "none" : "block";
      }

      function renderCalendarItem(item) {
        const isNews = item.kind === "news";
        const raw = item.raw;
        const badge = isNews ? "purple" : raw.surprise?.includes("上升") || raw.surprise?.includes("多增") ? "red" : raw.surprise?.includes("回落") || raw.surprise?.includes("少增") ? "green" : "blue";
        const summary = summarizeItem(item);
        const timeLabel = isNews ? newsTimeText(raw) : item.source;
        return `
          <button class="cal-item ${item.kind}" data-id="${escapeHtml(item.id)}" type="button">
            <span class="cal-title">${escapeHtml(summary.conclusion)}</span>
            <span class="cal-meta">
              <span class="pill">${escapeHtml(timeLabel)}</span>
              <span class="pill ${badge}">${escapeHtml(item.label)}</span>
            </span>
          </button>
        `;
      }

      function renderDetail(item) {
        if (!item) {
          els.detail.classList.remove("show");
          els.detail.innerHTML = "";
          return;
        }
        els.detail.classList.add("show");
        if (item.kind === "news") {
          const news = item.raw;
          openNewsModal(news);
          els.detail.classList.remove("show");
          els.detail.innerHTML = "";
          return;
        }
        const event = item.raw;
        const meta = classifyData(event);
        els.detail.innerHTML = `
          <h2>${escapeHtml(event.title)}</h2>
          <p class="detail-sub">${escapeHtml(meta.why)}</p>
          <div class="data-row">
            <div class="data-box"><b>实际</b><span>${escapeHtml(event.actual)}</span></div>
            <div class="data-box"><b>前值</b><span>${escapeHtml(event.previous)}</span></div>
            <div class="data-box"><b>预期</b><span>${escapeHtml(event.expected)}</span></div>
          </div>
          <div class="read-item">
            <b>所以呢</b>
            <span>${escapeHtml(readingFor(event))}</span>
          </div>
          ${renderIndicatorExplanation(event)}
        `;
      }

      function openNewsModal(news) {
        const item = {
          kind: "news",
          raw: news,
        };
        const summary = summarizeItem(item);
        els.modalTitle.textContent = summary.conclusion;
        const quality = news.contentQuality === "full" ? `已抓取全文（${news.contentChars || 0}字）` : news.contentQuality === "partial" ? `已抓取部分正文（${news.contentChars || 0}字）` : "仅标题/摘要，已降级处理";
        els.modalBody.innerHTML = `
          <p class="detail-sub">${escapeHtml(quality)}</p>
          <div class="read-item">
            <b>事实</b>
            <span>${escapeHtml(summary.fact || summary.conclusion.replace(/^事实[:：]/, ""))}</span>
          </div>
          <div class="read-item">
            <b>影响</b>
            <span>${escapeHtml(summary.impact || summary.reasons.join(""))}</span>
          </div>
          ${news.url ? `<a class="news-link" href="${escapeHtml(news.url)}" target="_blank" rel="noopener">打开原文</a>` : ""}
        `;
        els.newsModal.classList.add("show");
      }

      function closeNewsModal() {
        els.newsModal.classList.remove("show");
      }

      function explanationFor(value) {
        const body = `${value?.id || ""} ${value?.name || ""} ${value?.title || ""} ${value?.category || ""} ${value?.notes || ""}`;
        return INDICATOR_EXPLANATIONS.find((item) => item.keys.some((key) => body.includes(key)));
      }

      function renderIndicatorExplanation(event) {
        const explanation = explanationFor(event);
        if (!explanation) return "";
        return `
          <details class="indicator-explain">
            <summary>${escapeHtml(explanation.name)}：指标解释</summary>
            <div class="explain-body">
              <div class="read-item"><b>是什么</b><span>${escapeHtml(explanation.what)}</span></div>
              <div class="read-item"><b>怎么看</b><span>${escapeHtml(explanation.read)}</span></div>
              <div class="read-item"><b>对资产的含义</b><span>${escapeHtml(explanation.asset)}</span></div>
            </div>
          </details>
        `;
      }

      function readingFor(event) {
        const title = `${event.title || ""} ${event.surprise || ""}`;
        if (/非农|就业/.test(title)) return "就业强，降息预期容易后移；就业弱，市场更容易交易宽松和风险偏好修复。看它主要是为了判断美元、美债和成长资产方向。";
        if (/失业/.test(title)) return "失业率上升代表劳动力市场降温，可能支持宽松；失业率稳定则需要结合非农和工资数据判断。";
        if (/CPI|PPI|通胀/.test(title)) return "通胀高会压制降息预期并支撑名义利率；通胀回落通常利好黄金、成长股和风险资产。中国 CPI/PPI 更像需求和工业价格温度计。";
        return "这个指标用于确认宏观背景，不单独做判断，要和价格比值、币圈情绪、新闻叙事一起看。";
      }

      function renderQuestions() {
        if (!els.questionGrid) return;
        const questions = state.questions.length ? state.questions : [];
        els.questionGrid.innerHTML = questions
          .map((question) => `
            <article class="decision-card ${escapeHtml(question.tone || "neutral")}">
              <div>
                <p class="decision-kicker">${escapeHtml(question.subtitle || "")}</p>
                <h2>${escapeHtml(question.title)}</h2>
              </div>
              <p class="inclination">${escapeHtml(question.inclination)}</p>
              <details>
                <summary>依据 / 新闻</summary>
                <ul>${(question.bullets || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                <p class="how-use">${escapeHtml(question.howToUse)}</p>
                ${renderRelatedNews(question.news || [])}
              </details>
            </article>
          `)
          .join("");
      }

      function renderRelatedNews(news) {
        if (!news.length) return `<div class="related-news"><b>相关新闻</b><span class="how-use">暂无匹配新闻。</span></div>`;
        return `
          <div class="related-news">
            <b>相关新闻</b>
            ${news
              .map((item, index) => `
                <button class="news-link news-button" data-related-news="${escapeHtml(encodeURIComponent(JSON.stringify(item)))}" type="button">
                  <span>${escapeHtml(newsTimeText(item))}</span>
                  ${escapeHtml(summarizeNewsConclusion(item).fact)}
                </button>
              `)
              .join("")}
          </div>
        `;
      }

      function renderSignals() {
        if (!els.signalList) return;
        const signals = state.questions.slice(0, 4);
        els.signalList.innerHTML = signals
          .map((question) => `
            <div class="signal">
              <b>${escapeHtml(question.title)}</b>
              <span>${escapeHtml(question.inclination)}</span>
            </div>
          `)
          .join("");
      }

      function renderHeadline() {
        const decision = buildHeadlineDecision();
        if (els.headlineDecision) els.headlineDecision.textContent = decision.headline;
        if (els.headlineReason) els.headlineReason.textContent = decision.reason;
        if (els.assetActions) {
          els.assetActions.innerHTML = decision.actions
            .map((item) => `<span class="action-chip"><b>${escapeHtml(item.label)}</b>：${escapeHtml(item.value)}</span>`)
            .join("");
        }
        if (els.dataHealth) {
          els.dataHealth.textContent = state.sources.some((source) => source.status === "failed")
            ? "部分数据源失败，核心报告可用"
            : "核心数据源正常";
        }
        return decision;
      }

      function renderEvidenceCards(decision) {
        if (els.evidenceCards) {
          els.evidenceCards.innerHTML = buildEvidenceCards(decision)
            .map((card) => `
              <article class="evidence-card">
                <b>${escapeHtml(card.title)}：${escapeHtml(card.verdict)}</b>
                <p>${escapeHtml(card.note)}</p>
              </article>
            `)
            .join("");
        }

        if (els.supportEvidence) {
          els.supportEvidence.innerHTML = (decision.support.length ? decision.support : ["没有足够强的单边证据，先等待关键数据。"])
            .slice(0, 4)
            .map((item) => `<div class="evidence-note"><span>${escapeHtml(item)}</span></div>`)
            .join("");
        }

        if (els.counterEvidence) {
          els.counterEvidence.innerHTML = (decision.counter.length ? decision.counter : ["暂时缺少明显反向证据，但仍需看新闻和数据是否突然转向。"])
            .slice(0, 4)
            .map((item) => `<div class="evidence-note"><span>${escapeHtml(item)}</span></div>`)
            .join("");
        }
      }

      function renderWatchlist() {
        if (!els.watchlist) return;
        const items = buildWatchlist(sevenDayItems());
        els.watchlist.innerHTML = items.length
          ? renderAccordionItems(items.map((item) => ({ ...item, label: item.score === 3 ? "高" : item.score === 2 ? "中" : "低" })), { scope: "watch" })
          : `<div class="watch-card"><b>暂无必盯事件</b><p>当前 7 天窗口内没有足以改变总判断的事件。</p></div>`;
      }

      function renderRiskSchedule() {
        if (!els.riskSchedule) return;
        const nearTerm = sevenDayItems();
        const top = buildWatchlist(nearTerm);
        const topIds = new Set(top.map((item) => item.id));
        const items = top.concat(nearTerm.filter((item) => !topIds.has(item.id))).slice(0, 12);
        els.riskSchedule.innerHTML = items.length
          ? renderAccordionItems(items, { scope: "schedule", showDate: true })
          : `<div class="schedule-item"><b>-</b><p>当前筛选下没有风险事件。</p><span class="pill">空</span></div>`;
      }

      function assetDisplayMap() {
        const all = [...state.prices, ...state.ratios, ...state.rateMetrics, ...state.cryptoMetrics];
        return new Map(all.map((asset) => [asset.name, asset]));
      }

      function visibleAssetHistory() {
        const current = assetDisplayMap();
        const preferred = ["国际金价", "BTC", "美元指数 DXY", "VIX", "WTI 原油", "标普500", "ETH", "白银"];
        const ordered = [...state.assetHistory].sort((a, b) => {
          const ai = preferred.indexOf(a.name);
          const bi = preferred.indexOf(b.name);
          return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        });
        return ordered
          .filter((asset) => current.has(asset.name))
          .slice(0, 8)
          .map((asset) => ({ ...asset, current: current.get(asset.name) }));
      }

      function renderAssetSpotlight() {
        if (!els.assetSpotlight) return;
        const assets = visibleAssetHistory();
        els.assetSpotlight.innerHTML = assets.length
          ? assets.map((asset) => `
              <button class="asset-tile" data-asset-key="${escapeHtml(asset.key)}" type="button">
                <b>${escapeHtml(asset.name)}</b>
                <strong>${escapeHtml(asset.current?.value || "-")}</strong>
                <span>${escapeHtml(asset.updatedAt || asset.current?.notes || "-")}</span>
              </button>
            `).join("")
          : `<div class="asset-tile"><b>资产数据暂缺</b><strong>-</strong><span>等待下一次自动化刷新。</span></div>`;
      }

      function pointsForRange(asset) {
        const points = Array.isArray(asset?.points) ? asset.points : [];
        const count = state.selectedRange === "1d"
          ? 1
          : state.selectedRange === "7d"
            ? 7
            : state.selectedRange === "1m"
              ? 31
              : state.selectedRange === "3m"
                ? 92
                : 366;
        return points.slice(-count);
      }

      function formatNumber(value) {
        if (typeof value !== "number" || Number.isNaN(value)) return "-";
        return value >= 1000 ? value.toLocaleString("en-US", { maximumFractionDigits: 0 }) : value.toLocaleString("en-US", { maximumFractionDigits: 2 });
      }

      function niceAxisTicks(min, max, target = 6) {
        if (!Number.isFinite(min) || !Number.isFinite(max)) return [];
        if (min === max) return [min];
        const span = max - min;
        const rawStep = span / Math.max(2, target - 1);
        const power = Math.pow(10, Math.floor(Math.log10(rawStep)));
        const normalized = rawStep / power;
        const nice = normalized <= 1 ? 1 : normalized <= 2 ? 2 : normalized <= 5 ? 5 : 10;
        const step = nice * power;
        const start = Math.floor(min / step) * step;
        const end = Math.ceil(max / step) * step;
        const ticks = [];
        for (let value = start; value <= end + step / 2; value += step) {
          ticks.push(Number(value.toFixed(6)));
        }
        return ticks;
      }

      function shortDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return `${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      }

      function drawPointLabel(ctx, label, x, y, color) {
        ctx.save();
        ctx.font = "12px Microsoft YaHei, sans-serif";
        const textWidth = ctx.measureText(label).width;
        const boxX = Math.max(8, Math.min(x - textWidth / 2 - 6, state.chartLayout.width - textWidth - 16));
        const boxY = Math.max(8, Math.min(y - 30, 260));
        ctx.fillStyle = "rgba(255,255,255,0.94)";
        ctx.strokeStyle = "rgba(15,23,42,0.12)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, textWidth + 12, 24, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.fillText(label, boxX + 6, boxY + 16);
        ctx.restore();
      }

      function drawHoverCrosshair(ctx, point) {
        if (!point || !state.chartLayout) return;
        const { padding, width, height } = state.chartLayout;
        ctx.save();
        ctx.setLineDash([4, 5]);
        ctx.strokeStyle = "rgba(15, 23, 42, 0.28)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(point.x, padding.top);
        ctx.lineTo(point.x, height - padding.bottom);
        ctx.moveTo(padding.left, point.y);
        ctx.lineTo(width - padding.right, point.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#102033";
        ctx.beginPath();
        ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawAssetChart(asset, hoverIndex = null) {
        const canvas = els.drawerChart;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const points = pointsForRange(asset);
        const values = points.map((point) => point.value).filter((value) => typeof value === "number");
        const container = canvas.parentElement;
        canvas.style.width = "100%";
        canvas.style.height = "320px";
        const logicalWidth = Math.max(520, Math.floor(canvas.getBoundingClientRect().width || (container.clientWidth - 28)));
        const scale = window.devicePixelRatio || 1;
        canvas.width = Math.floor(logicalWidth * scale);
        canvas.height = Math.floor(320 * scale);
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        const width = logicalWidth;
        const height = 320;
        ctx.clearRect(0, 0, width, height);
        if (values.length < 2) {
          ctx.fillStyle = "#536274";
          ctx.font = "14px Microsoft YaHei, sans-serif";
          ctx.fillText("该时间维度下数据点不足。", 22, 46);
          return;
        }
        const min = Math.min(...values);
        const max = Math.max(...values);
        const axisTicks = niceAxisTicks(min, max, 6);
        const axisMin = axisTicks[0] ?? min;
        const axisMax = axisTicks[axisTicks.length - 1] ?? max;
        const padding = { top: 28, right: 28, bottom: 58, left: 62 };
        const innerW = width - padding.left - padding.right;
        const innerH = height - padding.top - padding.bottom;
        const y = (value) => padding.top + (axisMax === axisMin ? 0.5 : (axisMax - value) / (axisMax - axisMin)) * innerH;
        const x = (index) => padding.left + (index / (values.length - 1)) * innerW;
        const mappedPoints = points.map((point, index) => ({ ...point, x: x(index), y: y(point.value) }));
        state.chartLayout = { asset, points: mappedPoints, width, height, padding };

        ctx.strokeStyle = "#d7dee4";
        ctx.lineWidth = 1;
        ctx.font = "12px Microsoft YaHei, sans-serif";
        ctx.fillStyle = "#536274";
        axisTicks.forEach((tick) => {
          const yy = y(tick);
          ctx.beginPath();
          ctx.moveTo(padding.left, yy);
          ctx.lineTo(width - padding.right, yy);
          ctx.stroke();
          ctx.fillText(formatNumber(tick), 8, yy + 4);
        });

        const labelEvery = values.length <= 45 ? 1 : values.length <= 110 ? 3 : values.length <= 190 ? 7 : 14;
        mappedPoints.forEach((point, index) => {
          ctx.strokeStyle = "rgba(83,98,116,0.18)";
          ctx.beginPath();
          ctx.moveTo(point.x, height - padding.bottom);
          ctx.lineTo(point.x, height - padding.bottom + 5);
          ctx.stroke();
          if (index % labelEvery !== 0 && index !== mappedPoints.length - 1) return;
          ctx.save();
          ctx.translate(point.x, height - padding.bottom + 18);
          ctx.rotate(-Math.PI / 4);
          ctx.fillStyle = "#536274";
          ctx.font = "11px Microsoft YaHei, sans-serif";
          ctx.fillText(shortDate(point.date), 0, 0);
          ctx.restore();
        });

        ctx.beginPath();
        mappedPoints.forEach((point, index) => {
          if (index === 0) ctx.moveTo(point.x, point.y);
          else ctx.lineTo(point.x, point.y);
        });
        ctx.strokeStyle = values[values.length - 1] >= values[0] ? "#166534" : "#b42318";
        ctx.lineWidth = 2.5;
        ctx.stroke();

        const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
        gradient.addColorStop(0, values[values.length - 1] >= values[0] ? "rgba(22, 101, 52, 0.18)" : "rgba(180, 35, 24, 0.16)");
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.lineTo(width - padding.right, height - padding.bottom);
        ctx.lineTo(padding.left, height - padding.bottom);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        const highPoint = mappedPoints.reduce((best, point) => point.value > best.value ? point : best, mappedPoints[0]);
        const lowPoint = mappedPoints.reduce((best, point) => point.value < best.value ? point : best, mappedPoints[0]);
        drawPointLabel(ctx, `高 ${formatNumber(highPoint.value)}`, highPoint.x, highPoint.y, "#166534");
        drawPointLabel(ctx, `低 ${formatNumber(lowPoint.value)}`, lowPoint.x, lowPoint.y + 30, "#b42318");
        if (hoverIndex != null && mappedPoints[hoverIndex]) drawHoverCrosshair(ctx, mappedPoints[hoverIndex]);
      }

      function handleChartPointer(event) {
        if (!state.chartLayout) return;
        const rect = els.drawerChart.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const points = state.chartLayout.points;
        const nearest = points.reduce((best, point, index) => {
          const distance = Math.abs(point.x - x);
          return distance < best.distance ? { index, distance } : best;
        }, { index: 0, distance: Infinity });
        const point = points[nearest.index];
        drawAssetChart(state.chartLayout.asset, nearest.index);
        els.chartTooltip.style.display = "block";
        els.chartTooltip.style.left = `${Math.max(12, Math.min(point.x + 14, state.chartLayout.width - 150))}px`;
        els.chartTooltip.style.top = `${Math.max(12, point.y - 42)}px`;
        els.chartTooltip.innerHTML = `<b>${escapeHtml(point.date)}</b><span>${escapeHtml(formatNumber(point.value))}</span>`;
      }

      function hideChartPointer() {
        if (els.chartTooltip) els.chartTooltip.style.display = "none";
        if (state.chartLayout) drawAssetChart(state.chartLayout.asset);
      }

      function renderChartStats(asset) {
        if (!els.chartStats) return;
        const points = pointsForRange(asset);
        const first = points[0]?.value;
        const last = points[points.length - 1]?.value;
        const change = typeof first === "number" && typeof last === "number" && first !== 0 ? (last / first - 1) * 100 : null;
        const values = points.map((point) => point.value).filter((value) => typeof value === "number");
        const high = values.length ? Math.max(...values) : null;
        const low = values.length ? Math.min(...values) : null;
        els.chartStats.innerHTML = [
          ["区间涨跌", change == null ? "-" : formatPct(change)],
          ["区间高点", high == null ? "-" : formatNumber(high)],
          ["区间低点", low == null ? "-" : formatNumber(low)],
        ].map(([label, value]) => `<div class="chart-stat"><b>${label}</b><span>${value}</span></div>`).join("");
      }

      function openAssetDrawer(key) {
        const asset = state.assetHistory.find((item) => item.key === key);
        if (!asset) return;
        const current = assetDisplayMap().get(asset.name);
        state.selectedAssetKey = key;
        els.drawerTitle.textContent = asset.name;
        els.drawerPrice.textContent = current?.value || formatNumber(asset.points?.at(-1)?.value);
        els.drawerMeta.textContent = `${asset.source || "Yahoo Finance"} · ${asset.symbol} · 更新 ${asset.updatedAt || "-"}`;
        els.rangeTabs.querySelectorAll("button").forEach((button) => {
          button.classList.toggle("active", button.dataset.range === state.selectedRange);
        });
        drawAssetChart(asset);
        renderChartStats(asset);
        els.assetDrawer.classList.add("show");
        els.assetDrawer.setAttribute("aria-hidden", "false");
      }

      function closeAssetDrawer() {
        els.assetDrawer.classList.remove("show");
        els.assetDrawer.setAttribute("aria-hidden", "true");
      }

      function renderSide() {
        const briefing = state.dailyBriefing || {};
        const briefingItems = Array.isArray(briefing.items) ? briefing.items : [];
        if (els.briefingList) {
          els.briefingList.innerHTML = briefingItems.length
            ? briefingItems
                .map((item) => `
                  <div class="read-item">
                    <b>${escapeHtml(item.title)}</b>
                    <span>${escapeHtml(briefing.source || "新闻联播")} · ${escapeHtml(briefing.date || "-")}</span>
                  </div>
                `)
                .join("")
            : `<div class="read-item"><b>暂未拉到新闻联播要闻</b><span>不影响四个宏观判断；实时新闻仍会进入日历。</span></div>`;
        }

        els.explainList.innerHTML = INDICATOR_EXPLANATIONS.map((item, index) => `
          <details class="explain-card" ${index < 3 ? "open" : ""}>
            <summary>${escapeHtml(item.name)}</summary>
            <p>${escapeHtml(item.read)}</p>
            <p>${escapeHtml(item.asset)}</p>
          </details>
        `).join("");

        els.sourceGrid.innerHTML = state.sources
          .map((source) => `
            <div class="asset-card">
              <b>${escapeHtml(source.name)}</b>
              <span>${escapeHtml(source.status)} · ${escapeHtml(source.usage)}</span>
            </div>
          `)
          .join("");
      }

      function renderStats() {
        const fear = state.cryptoMetrics.find((item) => item.name.includes("恐慌"));
        const regime = state.questions.find((item) => item.id === "risk-regime");
        if (els.eventCount) els.eventCount.textContent = state.events.length;
        if (els.newsCount) els.newsCount.textContent = state.news.length;
        if (els.cryptoMood) els.cryptoMood.textContent = fear ? fear.value : "-";
        if (els.riskSignal) els.riskSignal.textContent = regime ? (regime.tone === "defensive" ? "偏避险" : regime.tone === "risk" ? "偏冒险" : "分歧") : "-";
      }

      function render() {
        const decision = renderHeadline();
        renderEvidenceCards(decision);
        renderWatchlist();
        renderRiskSchedule();
        renderCalendar();
        renderAssetSpotlight();
        renderSide();
        renderStats();
        const selected = calendarItems().find((item) => item.id === state.selectedId);
        const defaultData = sevenDayItems().find((item) => item.kind === "data")
          || calendarItems().find((item) => item.kind === "data");
        renderDetail(selected?.kind === "data" ? selected : defaultData);
      }

      document.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-id]");
        if (!button) return;
        state.selectedId = button.dataset.id;
        renderDetail(calendarItems().find((item) => item.id === state.selectedId));
      });

      document.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-accordion-id]");
        if (!button) return;
        state.selectedAccordionId = button.dataset.accordionId;
        renderWatchlist();
        renderRiskSchedule();
      });

      document.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-asset-key]");
        if (!button) return;
        openAssetDrawer(button.dataset.assetKey);
      });

      els.rangeTabs.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-range]");
        if (!button) return;
        state.selectedRange = button.dataset.range;
        openAssetDrawer(state.selectedAssetKey);
      });

      els.drawerClose.addEventListener("click", closeAssetDrawer);
      els.assetDrawer.addEventListener("click", (event) => {
        if (event.target === els.assetDrawer) closeAssetDrawer();
      });
      els.drawerChart.addEventListener("mousemove", handleChartPointer);
      els.drawerChart.addEventListener("mouseleave", hideChartPointer);

      document.addEventListener("click", (event) => {
        const related = event.target.closest("button[data-related-news]");
        if (!related) return;
        try {
          openNewsModal(JSON.parse(decodeURIComponent(related.getAttribute("data-related-news"))));
        } catch {
          return;
        }
      });

      els.modalClose.addEventListener("click", closeNewsModal);
      els.newsModal.addEventListener("click", (event) => {
        if (event.target === els.newsModal) closeNewsModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeNewsModal();
          closeAssetDrawer();
        }
      });

      [els.typeFilter, els.impactFilter].forEach((el) => el.addEventListener("input", render));

      fetch("data/macro-latest.json", { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then((data) => {
          state.events = Array.isArray(data.events) ? data.events : [];
          state.news = dedupeNews(Array.isArray(data.news) ? data.news : []);
          state.ratios = Array.isArray(data.ratios) ? data.ratios : [];
          state.assetHistory = Array.isArray(data.assetHistory) ? data.assetHistory : [];
          state.rateMetrics = Array.isArray(data.rateMetrics) ? data.rateMetrics : [];
          state.prices = Array.isArray(data.prices) ? data.prices : [];
          state.cryptoMetrics = Array.isArray(data.cryptoMetrics) ? data.cryptoMetrics : [];
          state.questions = Array.isArray(data.questions) ? data.questions : [];
          state.dailyBriefing = data.dailyBriefing || null;
          state.sources = Array.isArray(data.sources) ? data.sources : [];
          if (els.summary) els.summary.textContent = data.summary || "已读取金融宏观日历。";
          els.generatedAt.textContent = `生成时间：${data.generatedAt || "-"}`;
          render();
          const deepLinkedAsset = decodeURIComponent(location.hash.replace(/^#asset=/, ""));
          if (deepLinkedAsset && deepLinkedAsset !== location.hash) openAssetDrawer(deepLinkedAsset);
        })
        .catch((error) => {
          if (els.summary) els.summary.textContent = `宏观数据读取失败：${error.message}`;
          render();
        });
    </script>
  </body>
</html>
